<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Positioning Pro — Feedback FX (Roadmap #10)</title>
<style>
  :root{--bg:#0b1120;--panel:#131c2e;--line:#22304a;--ink:#e6edf7;--mut:#8fa3c0;--cy:#38bdf8;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
  h1{font-size:18px;margin:0} .sub{color:var(--mut);font-size:12px;margin:-6px 0 6px;text-align:center;max-width:460px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:min(520px,94vw)}
  button{background:#0e1626;color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;font-size:14px;font-weight:600}
  button:hover{border-color:var(--cy)}
  .toggles{display:flex;gap:16px;color:var(--mut);font-size:13px}
  .foot{color:var(--mut);font-size:12px;margin-top:8px}
</style>
</head>
<body>
  <h1>Feedback FX</h1>
  <p class="sub">Web-Audio tones + haptic vibration patterns for UI events. Tap a button. (Haptics fire on phones with vibrate support.)</p>
  <div class="toggles">
    <label><input type="checkbox" id="snd" checked> Sound</label>
    <label><input type="checkbox" id="hap" checked> Haptics</label>
  </div>
  <div class="grid" id="grid"></div>
  <div class="foot" id="foot"></div>

<script src="feedback-fx.js"></script>
<script>
  const fx=FeedbackFX({sound:true,haptics:true});
  document.getElementById('snd').onchange=e=>fx.set('sound',e.target.checked);
  document.getElementById('hap').onchange=e=>fx.set('haptics',e.target.checked);
  const names=fx.patterns();
  document.getElementById('grid').innerHTML=names.map(n=>`<button data-n="${n}">${n}</button>`).join('');
  document.querySelectorAll('#grid button').forEach(b=>b.addEventListener('click',()=>{ fx.resume(); fx.play(b.getAttribute('data-n')); }));
  const t=FeedbackFXAPI.selfTest();
  document.getElementById('foot').textContent='feedback-fx.js self-test: '+(t.pass?'PASS ✓':'FAIL — '+t.failures.join('; '));
</script>
</body>
</html>
