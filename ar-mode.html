<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Positioning Pro — AR Mode (Roadmap #5)</title>
<style>
  :root{--ink:#e6edf7;--mut:#8fa3c0;--cy:#38bdf8;--ok:#34d399;--panel:rgba(10,16,28,.82);--line:#22304a;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#05070d;color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#0a0f1a}
  .fallback{position:fixed;inset:0;background:radial-gradient(120% 80% at 50% 20%,#12203a,#05070d)}
  #overlay{position:fixed;inset:0;pointer-events:none}
  .hud{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;gap:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;backdrop-filter:blur(8px)}
  .card h1{font-size:14px;margin:0 0 4px} .card p{margin:0;color:var(--mut);font-size:12px;max-width:220px}
  .read{font-variant-numeric:tabular-nums}
  .read b{color:var(--cy)} .read.ok b{color:var(--ok)}
  .start{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);background:var(--cy);color:#04121f;border:none;border-radius:12px;
         padding:14px 22px;font-weight:800;font-size:15px;cursor:pointer;pointer-events:auto}
  .badge{position:absolute;bottom:14px;left:14px;color:var(--mut);font-size:11px}
</style>
</head>
<body>
  <div class="fallback" id="fallback"></div>
  <video id="cam" autoplay muted playsinline style="display:none"></video>
  <svg id="overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>

  <div class="hud">
    <div class="card"><h1>AR Tube Placement</h1><p id="mode">Detecting capabilities…</p></div>
    <div class="card read" id="readout"><div>Beam tilt <b id="tilt">—</b></div><div>Align <b id="align">—</b></div></div>
  </div>
  <button class="start" id="startBtn">Start AR-lite</button>
  <div class="badge">WebXR when available · camera + device-orientation fallback</div>

<script>
(function(){
  const modeEl=document.getElementById('mode'), overlay=document.getElementById('overlay'),
        tiltEl=document.getElementById('tilt'), alignEl=document.getElementById('align'), startBtn=document.getElementById('startBtn');
  let beta=0, gamma=0;

  // capability report
  const hasXR = !!(navigator.xr && navigator.xr.isSessionSupported);
  const hasCam = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  const hasOri = 'DeviceOrientationEvent' in window;
  (async ()=>{
    let xrAr=false; try{ if(hasXR) xrAr=await navigator.xr.isSessionSupported('immersive-ar'); }catch(e){}
    modeEl.textContent = xrAr ? 'WebXR immersive-AR supported — full AR available on device.'
      : (hasCam ? 'AR-lite: camera + orientation overlay.' : 'No camera/AR here — showing simulated overlay. Open on a phone for the real thing.');
    startBtn.textContent = xrAr ? 'Enter AR' : 'Start AR-lite';
    startBtn._xr=xrAr;
  })();

  function drawOverlay(){
    // tube crosshair drifts with device gamma (left/right) and beta (tilt)
    const cx=50 + Math.max(-30,Math.min(30, gamma))*0.8;
    const cy=50 + Math.max(-30,Math.min(30, (beta-45)))*0.6;
    const aligned = Math.abs(cx-50)<6 && Math.abs(cy-50)<6;
    const col = aligned ? '#34d399' : '#fbbf24';
    overlay.innerHTML =
      // detector target at screen center
      `<rect x="34" y="34" width="32" height="32" fill="none" stroke="#38bdf8" stroke-width="0.4" stroke-dasharray="2 1.5" vector-effect="non-scaling-stroke"/>`+
      // beam cone from top to crosshair
      `<polygon points="${cx-2},4 ${cx+2},4 ${cx+10},${cy} ${cx-10},${cy}" fill="${col}" opacity="0.14"/>`+
      // crosshair (CR)
      `<line x1="${cx-8}" y1="${cy}" x2="${cx+8}" y2="${cy}" stroke="${col}" stroke-width="0.6" vector-effect="non-scaling-stroke"/>`+
      `<line x1="${cx}" y1="${cy-8}" x2="${cx}" y2="${cy+8}" stroke="${col}" stroke-width="0.6" vector-effect="non-scaling-stroke"/>`+
      `<circle cx="${cx}" cy="${cy}" r="1.2" fill="${col}"/>`;
    tiltEl.textContent=Math.round(beta-45)+'°';
    const ar=alignEl.parentElement; alignEl.textContent=aligned?'centered':'off';
    ar.className='read'+(aligned?' ok':'');
  }

  function onOri(e){ beta=e.beta==null?45:e.beta; gamma=e.gamma==null?0:e.gamma; drawOverlay(); }

  async function start(){
    startBtn.style.display='none';
    // 1) WebXR path (device only)
    if(startBtn._xr){
      try{ const s=await navigator.xr.requestSession('immersive-ar'); modeEl.textContent='In AR session.'; s.end&&setTimeout(()=>{},0); return; }catch(e){ modeEl.textContent='AR session declined — using AR-lite.'; }
    }
    // 2) camera feed
    if(hasCam){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        const v=document.getElementById('cam'); v.srcObject=stream; v.style.display='block'; document.getElementById('fallback').style.display='none';
      }catch(e){ modeEl.textContent='Camera blocked — simulated overlay.'; simulate(); }
    } else simulate();
    // 3) orientation
    if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
      try{ const p=await DeviceOrientationEvent.requestPermission(); if(p==='granted') window.addEventListener('deviceorientation',onOri); else simulate(); }
      catch(e){ simulate(); }
    } else if('DeviceOrientationEvent' in window){ window.addEventListener('deviceorientation',onOri); }
    else simulate();
    drawOverlay();
  }
  let simT=null;
  function simulate(){ // gentle auto-motion so the overlay is alive on desktop
    if(simT) return; let t=0; simT=setInterval(()=>{ t+=0.05; gamma=Math.sin(t)*22; beta=45+Math.cos(t*0.7)*16; drawOverlay(); },40);
  }

  startBtn.addEventListener('click',start);
  drawOverlay();
})();
</script>
</body>
</html>
