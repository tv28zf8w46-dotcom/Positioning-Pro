<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radiograph Sim — Preview</title>
<style>
  :root{--bg:#0b1120;--panel:#131c2e;--line:#22304a;--ink:#e6edf7;--mut:#8fa3c0;--cy:#38bdf8;--ok:#34d399;--bad:#fb7185;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:20px}
  h1{font-size:18px;margin:0 0 4px} .sub{color:var(--mut);margin:0 0 18px}
  .layout{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  label{display:block;font-size:12px;color:var(--mut);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.04em}
  input[type=range]{width:100%} select{width:100%;background:#0e1626;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px}
  .val{float:right;color:var(--cy);font-variant-numeric:tabular-nums}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rs-wrap{max-width:340px;margin:0 auto}
  .rs-film{width:100%;border-radius:10px;display:block;background:#05070d}
  .rs-banner{padding:8px 12px;border-radius:8px 8px 0 0;font-weight:600;font-size:13px}
  .rs-ok{background:rgba(52,211,153,.14);color:var(--ok)} .rs-bad{background:rgba(251,113,133,.14);color:var(--bad)}
  .rs-faults{list-style:none;margin:10px 0 0;padding:0}
  .rs-f{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:#0e1626;margin-bottom:6px;font-size:13px}
  .rs-dot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex:none}
  .rs-s1 .rs-dot{background:#fbbf24}.rs-s2 .rs-dot{background:#fb923c}.rs-s3 .rs-dot{background:var(--bad)}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-top:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}
  .card h3{margin:0 0 8px;font-size:12px;color:var(--mut)} .card .rs-film{border-radius:6px}
  .foot{color:var(--mut);font-size:12px;margin-top:8px}
</style>
</head>
<body>
  <h1>Simulated Radiograph Output <span style="color:var(--mut);font-weight:400">— Roadmap #4</span></h1>
  <p class="sub">Drag the technique controls; the film re-develops live. Faults are derived, not scripted.</p>

  <div class="layout">
    <div class="panel">
      <label>Region / View</label>
      <select id="view"></select>
      <label>kVp <span class="val" id="kvpV"></span></label><input type="range" id="kvp" min="40" max="90" step="1">
      <label>mAs <span class="val" id="masV"></span></label><input type="range" id="mas" min="0.5" max="6" step="0.1">
      <label>SID (in) <span class="val" id="sidV"></span></label><input type="range" id="sid" min="30" max="72" step="1">
      <label>Tube angle ° <span class="val" id="angV"></span></label><input type="range" id="ang" min="-25" max="25" step="1">
      <div class="row2">
        <div><label>CR offset X <span class="val" id="cxV"></span></label><input type="range" id="cx" min="-120" max="120" step="2"></div>
        <div><label>CR offset Y <span class="val" id="cyV"></span></label><input type="range" id="cy" min="-120" max="120" step="2"></div>
      </div>
      <div class="row2">
        <div><label>Focal</label><select id="focal"><option>Small</option><option>Large</option></select></div>
        <div><label>Detector</label><select id="ir"><option>Tabletop / Non-Bucky</option><option>Bucky</option></select></div>
      </div>
      <p class="foot" id="selftest"></p>
    </div>
    <div id="stage"></div>
  </div>

  <h3 style="margin:26px 0 0">Error gallery (fixed scenarios)</h3>
  <div class="gallery" id="gallery"></div>

<script src="radiograph-sim.js"></script>
<script>
  // reference "correct" technique per view (mirrors the app's EXAMS/atlas)
  const REFS = {
    'Hand|PA':          {kvp:60,mas:2.5,sid:40,focal:'Small',ir:'Tabletop / Non-Bucky',cr:{x:167,y:179},crAngleSigned:0,tolPx:30,vb:'0 0 360 481'},
    'Hand|Oblique':     {kvp:60,mas:2.8,sid:40,focal:'Small',ir:'Tabletop / Non-Bucky',cr:{x:162,y:164},crAngleSigned:0,tolPx:30,vb:'0 0 360 331'},
    'Hand|Fan Lateral': {kvp:62,mas:3.2,sid:40,focal:'Small',ir:'Tabletop / Non-Bucky',cr:{x:164,y:141},crAngleSigned:0,tolPx:30,vb:'0 0 360 327'},
    'Foot|AP':          {kvp:60,mas:4,sid:40,focal:'Small',ir:'Tabletop / Non-Bucky',cr:{x:189,y:284},crAngleSigned:10,tolPx:32,vb:'0 0 360 687'},
    'Foot|Oblique':     {kvp:60,mas:4,sid:40,focal:'Small',ir:'Tabletop / Non-Bucky',cr:{x:179,y:307},crAngleSigned:0,tolPx:32,vb:'0 0 360 687'},
    'Foot|Lateral':     {kvp:60,mas:3.5,sid:40,focal:'Small',ir:'Tabletop / Non-Bucky',cr:{x:184,y:291},crAngleSigned:0,tolPx:30,vb:'0 0 360 686'},
  };
  const viewSel = document.getElementById('view');
  Object.keys(REFS).forEach(k=>{const o=document.createElement('option');o.value=o.textContent=k;viewSel.appendChild(o);});

  const ids=['kvp','mas','sid','ang','cx','cy'];
  function setDefaults(){
    const key=viewSel.value, ref=REFS[key];
    kvp.value=ref.kvp; mas.value=ref.mas; sid.value=ref.sid; ang.value=ref.crAngleSigned;
    cx.value=0; cy.value=0; focal.value=ref.focal; ir.value=ref.ir; draw();
  }
  function draw(){
    const key=viewSel.value, ref=REFS[key];
    kvpV.textContent=kvp.value; masV.textContent=(+mas.value).toFixed(1); sidV.textContent=sid.value;
    angV.textContent=ang.value; cxV.textContent=cx.value; cyV.textContent=cy.value;
    const [reg,vw]=key.split('|');
    const ans={kvp:+kvp.value,mas:+mas.value,sid:+sid.value,focal:focal.value,ir:ir.value,
      crPos:{x:ref.cr.x+ +cx.value, y:ref.cr.y+ +cy.value}, crAngle:{signed:+ang.value}};
    const out=RadiographSim.render({region:reg,view:vw},ans,ref);
    document.getElementById('stage').innerHTML=out.html;
  }
  viewSel.onchange=setDefaults;
  ids.forEach(i=>document.getElementById(i).oninput=draw);
  focal.onchange=draw; ir.onchange=draw;

  // error gallery
  const scenarios=[
    ['Perfect', a=>a],
    ['Underexposed (mAs↓)', a=>({...a,mas:1}) ],
    ['Overexposed (mAs↑)', a=>({...a,mas:6}) ],
    ['Low contrast (kVp↑)', a=>({...a,kvp:85}) ],
    ['Clipped (CR off)', a=>({...a,crPos:{x:a.crPos.x+90,y:a.crPos.y+70}}) ],
    ['Distorted (angle 18°)', a=>({...a,crAngle:{signed:18}}) ],
  ];
  function buildGallery(){
    const key='Hand|PA', ref=REFS[key];
    const base={kvp:ref.kvp,mas:ref.mas,sid:ref.sid,focal:ref.focal,ir:ref.ir,crPos:{x:ref.cr.x,y:ref.cr.y},crAngle:{signed:ref.crAngleSigned}};
    document.getElementById('gallery').innerHTML=scenarios.map(([name,fn])=>{
      const out=RadiographSim.render({region:'Hand',view:'PA'},fn(JSON.parse(JSON.stringify(base))),ref);
      return '<div class="card"><h3>'+name+'</h3>'+out.svg+'</div>';
    }).join('');
  }

  const t=RadiographSim.selfTest();
  document.getElementById('selftest').textContent='Self-test: '+(t.pass?'PASS ✓':'FAIL — '+t.failures.join('; '));
  setDefaults(); buildGallery();
</script>
</body>
</html>
