<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Positioning Pro — View Transitions (Roadmap #12)</title>
<style>
  :root{--bg:#0b1120;--panel:#131c2e;--line:#22304a;--ink:#e6edf7;--mut:#8fa3c0;--cy:#38bdf8;--ok:#34d399;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
       display:flex;flex-direction:column;align-items:center;padding:22px}
  h1{font-size:18px;margin:0 0 2px} .sub{color:var(--mut);font-size:12px;margin:0 0 6px;text-align:center}
  .status{font-size:12px;color:var(--mut);margin-bottom:14px}
  .stage{width:min(560px,96vw)}
  .screen{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;min-height:320px}
  .crumbs{display:flex;gap:8px;margin-bottom:14px}
  .crumbs span{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);padding:4px 10px;border:1px solid var(--line);border-radius:20px}
  .crumbs span.on{color:#04121f;background:var(--cy);border-color:var(--cy);font-weight:700}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .tile{background:#0e1626;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;cursor:pointer;font-weight:600}
  .tile:hover{border-color:var(--cy)}
  .hero{display:flex;gap:16px;align-items:center;margin-bottom:14px}
  .hero .badge{width:84px;height:84px;border-radius:16px;background:linear-gradient(135deg,#38bdf8,#0e7490);flex:none;
        display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#04121f}
  button{background:var(--cy);color:#04121f;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;margin-right:8px}
  button.ghost{background:#0e1626;color:var(--ink);border:1px solid var(--line)}
  .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
  .big{font-size:40px;font-weight:900;color:var(--ok)}
  /* view transition names for shared-element morphs */
  .badge{view-transition-name:examBadge}
  .title{view-transition-name:examTitle}
  ::view-transition-old(root),::view-transition-new(root){animation-duration:.42s}
  @keyframes vt-fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
  <h1>Animated View Transitions</h1>
  <p class="sub">picker → room → review morph instead of hard repaints, via the View Transitions API.</p>
  <div class="status" id="status"></div>

  <div class="stage">
    <div class="crumbs" id="crumbs"><span data-c="picker">Picker</span><span data-c="room">Room</span><span data-c="review">Review</span></div>
    <div class="screen" id="screen"></div>
  </div>

<script>
  let view='picker', exam='AP Elbow';
  const supported = !!document.startViewTransition;
  document.getElementById('status').textContent = supported
    ? 'View Transitions API: supported — morphing enabled.'
    : 'View Transitions API: not supported here — falling back to a fade.';

  function go(next){
    const render=()=>{ view=next; paint(); };
    if(supported){ document.startViewTransition(render); }
    else { const s=document.getElementById('screen'); s.style.animation='none'; render(); s.style.animation='vt-fade .3s'; }
  }
  function pickExam(name){ exam=name; go('room'); }

  function paint(){
    document.querySelectorAll('.crumbs span').forEach(s=>s.classList.toggle('on',s.getAttribute('data-c')===view));
    const s=document.getElementById('screen');
    if(view==='picker'){
      s.innerHTML=`<div class="pp-label" style="color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Choose a projection</div>
        <div class="tiles">${['AP Elbow','Lateral Elbow','PA Wrist','PA Hand','AP Foot','Lateral Foot'].map(n=>`<div class="tile" onclick="pickExam('${n}')">${n}</div>`).join('')}</div>`;
    } else if(view==='room'){
      s.innerHTML=`<div class="hero"><div class="badge">${exam.split(' ')[0][0]}</div>
        <div><div class="title" style="font-size:22px;font-weight:800">${exam}</div><div style="color:var(--mut)">Tabletop · 40" SID · small focal</div></div></div>
        <div class="row"><span style="color:var(--mut)">kVp</span><b>70</b></div>
        <div class="row"><span style="color:var(--mut)">mAs</span><b>5.0</b></div>
        <div class="row"><span style="color:var(--mut)">CR</span><b>Mid-elbow joint</b></div>
        <div style="margin-top:16px"><button onclick="go('review')">Expose →</button><button class="ghost" onclick="go('picker')">Back</button></div>`;
    } else {
      s.innerHTML=`<div class="hero"><div class="badge" style="background:linear-gradient(135deg,#34d399,#0e7490)">✓</div>
        <div><div class="title" style="font-size:22px;font-weight:800">${exam}</div><div style="color:var(--mut)">Reviewed</div></div></div>
        <div class="big">92%</div><div style="color:var(--mut)">Diagnostic — clean positioning.</div>
        <div style="margin-top:16px"><button onclick="go('picker')">Next patient</button><button class="ghost" onclick="go('room')">Redo</button></div>`;
    }
  }
  paint();
</script>
</body>
</html>
