<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
<meta name="theme-color" content="#020617" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Positioning Pro" />
<title>Positioning Pro</title>
<style>
:root{
  --bg:#020617;--panel:#0f172a;--panel2:#111827;--panel3:#1e293b;--border:#334155;--border2:#475569;
  --text:#f8fafc;--muted:#94a3b8;--cyan:#67e8f9;--cyan2:#0891b2;--green:#6ee7b7;--red:#fda4af;--rose:#881337;--yellow:#fde68a;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif}
html{padding-top:env(safe-area-inset-top,0px);box-sizing:border-box;background:var(--bg)}
body{background:radial-gradient(circle at 25% 10%,rgba(34,211,238,.16),transparent 32%),radial-gradient(circle at 85% 0%,rgba(168,85,247,.14),transparent 30%),linear-gradient(180deg,#020617 0%,#020617 45%,#0f172a 100%)}
button{font:inherit}
.app{max-width:1400px;margin:0 auto;padding:22px;padding-top:calc(env(safe-area-inset-top,0px) + 22px)}
.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.brand{color:var(--cyan);text-transform:uppercase;letter-spacing:.24em;font-weight:1000;font-size:13px}
.hero .brand{font-size:22px;letter-spacing:.18em}
h1{margin:8px 0 6px;font-size:clamp(38px,6vw,76px);line-height:.92;letter-spacing:-.06em}
h2{margin:0 0 8px;font-size:24px}
h3{margin:4px 0;color:#cffafe}
p{color:#cbd5e1;line-height:1.45;margin:6px 0}
.btn{border:1px solid var(--border2);background:linear-gradient(180deg,#334155,#1e293b);color:white;border-radius:18px;padding:13px 18px;font-weight:1000;cursor:pointer;box-shadow:0 12px 24px rgba(0,0,0,.18)}
.btn:hover{filter:brightness(1.12)}
.btn.primary{background:linear-gradient(180deg,#0891b2,#0e7490);border-color:var(--cyan)}
.btn.large{padding:18px 28px;font-size:16px;border-radius:22px;letter-spacing:.04em;text-transform:uppercase;box-shadow:0 18px 36px rgba(8,145,178,.32)}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(1)}
.card{background:rgba(15,23,42,.88);border:1px solid var(--border);border-radius:26px;padding:18px;box-shadow:0 24px 60px rgba(0,0,0,.28);backdrop-filter:blur(10px)}
.book{background:linear-gradient(135deg,rgba(8,47,73,.78),rgba(15,23,42,.88))}
.book.failed{background:linear-gradient(135deg,rgba(136,19,55,.78),rgba(15,23,42,.9))}
.row{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;background:#1e293b;border:1px solid #475569;color:#e2e8f0;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900}
.layout{display:grid;grid-template-columns:minmax(0,1.12fr) minmax(360px,.88fr);gap:20px;margin-top:18px;align-items:start}
@media(max-width:1050px){.layout{grid-template-columns:1fr}}
.room{position:relative;overflow:hidden;height:min(66vw,680px);min-height:520px;border-radius:34px;border:1px solid var(--border);background:#020617;perspective:900px;box-shadow:0 28px 90px rgba(0,0,0,.42)}
.room::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 17%,rgba(34,211,238,.2),transparent 30%),radial-gradient(circle at 82% 12%,rgba(168,85,247,.18),transparent 28%),linear-gradient(to bottom,#0f172a,#020617)}
.wall{position:absolute;left:0;right:0;top:0;height:38%;background:rgba(30,41,59,.82);border-bottom:1px solid var(--border)}
.floor{position:absolute;left:-8%;right:-8%;bottom:-10%;height:58%;background:#111827;transform:rotateX(62deg);transform-origin:bottom;background-image:linear-gradient(rgba(148,163,184,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.16) 1px,transparent 1px);background-size:44px 44px}
.wall-bucky{position:absolute;right:20%;top:16%;width:86px;height:238px;background:#cbd5e1;border:5px solid #64748b;border-radius:20px;box-shadow:0 30px 70px rgba(0,0,0,.55);cursor:pointer;color:#334155;display:flex;justify-content:center;align-items:flex-start;padding-top:22px;font-size:12px;font-weight:1000;transition:.4s cubic-bezier(.4,0,.2,1);z-index:3}
.wall-bucky.active{transform:scale(1.08);opacity:1;background:linear-gradient(180deg,#ecfeff,#cbd5e1);border-color:var(--cyan);box-shadow:0 0 50px rgba(34,211,238,.55),0 0 110px rgba(34,211,238,.3),0 30px 70px rgba(0,0,0,.55);animation:buckyPulse 2.4s ease-in-out infinite}
.wall-bucky:not(.active){transform:scale(.9);opacity:.4}
.wall-bucky::after{content:"";position:absolute;left:50%;top:50%;width:54px;height:54px;border:2px dashed rgba(51,65,85,.45);border-radius:8px;transform:translate(-50%,-50%);pointer-events:none}
@keyframes buckyPulse{0%,100%{box-shadow:0 0 50px rgba(34,211,238,.55),0 0 110px rgba(34,211,238,.3),0 30px 70px rgba(0,0,0,.55)}50%{box-shadow:0 0 70px rgba(34,211,238,.75),0 0 140px rgba(34,211,238,.45),0 30px 70px rgba(0,0,0,.55)}}
.table{position:absolute;left:7%;bottom:23%;width:min(520px,72%);height:66px;background:#e2e8f0;border:1px solid #94a3b8;border-radius:22px;box-shadow:0 30px 70px rgba(0,0,0,.6);cursor:pointer;transition:.4s cubic-bezier(.4,0,.2,1);z-index:3}
.table.active{transform:scale(1.03);opacity:1;background:linear-gradient(180deg,#f8fafc,#cbd5e1);border-color:var(--cyan);box-shadow:0 0 50px rgba(34,211,238,.45),0 0 110px rgba(34,211,238,.22),0 30px 70px rgba(0,0,0,.6)}
.table:not(.active){opacity:.55}
.table::before{content:"";position:absolute;left:13%;right:18%;top:17px;height:30px;background:#cbd5e1;border-radius:14px}
.table::after{content:"";position:absolute;left:20%;bottom:-65px;width:38px;height:65px;background:#475569;box-shadow:250px 0 0 #475569}
.patient{position:absolute;background:linear-gradient(90deg,#f8fafc,#cbd5e1);box-shadow:0 20px 50px rgba(0,0,0,.5);transition:all .65s cubic-bezier(.4,0,.2,1);z-index:5}
.patient.lying{left:13%;bottom:33%;width:280px;height:44px;border-radius:999px}
.patient.lying::after{content:"";position:absolute;right:-18px;top:-13px;width:72px;height:72px;background:#e2e8f0;border-radius:999px}
.patient.lying::before{content:"";position:absolute;left:30%;top:50%;width:10px;height:10px;background:#ef4444;border-radius:999px;transform:translateY(-50%);box-shadow:0 0 8px rgba(239,68,68,.7);animation:heartbeat 1.4s ease-in-out infinite}
.patient.standing{right:23%;left:auto;top:14%;bottom:auto;width:54px;height:240px;border-radius:30px;background:linear-gradient(180deg,#f8fafc,#cbd5e1)}
.patient.standing::after{content:"";position:absolute;left:50%;top:-32px;transform:translateX(-50%);width:54px;height:54px;background:#e2e8f0;border-radius:999px}
.patient.standing::before{content:"";position:absolute;left:50%;top:36%;width:10px;height:10px;background:#ef4444;border-radius:999px;transform:translateX(-50%);box-shadow:0 0 8px rgba(239,68,68,.7);animation:heartbeat 1.4s ease-in-out infinite}
@keyframes heartbeat{0%,100%{opacity:.65;filter:drop-shadow(0 0 4px rgba(239,68,68,.5))}30%{opacity:1;filter:drop-shadow(0 0 14px rgba(239,68,68,.95))}60%{opacity:.85}}
.patient.standing::before{transform:translateX(-50%) scale(1)}
.patient.standing.beating::before,.patient.lying.beating::before{animation:heartbeat 1.4s ease-in-out infinite}
.tube{position:absolute;width:145px;transition:.55s cubic-bezier(.4,0,.2,1);z-index:7;transform-origin:center top}
.tube-stem{width:22px;height:125px;background:linear-gradient(180deg,#475569,#334155);margin:0 auto;border-radius:0 0 4px 4px}
.tube-head{height:68px;background:linear-gradient(180deg,#e2e8f0,#94a3b8);border:5px solid #64748b;border-radius:20px;display:flex;align-items:center;justify-content:center;color:#334155;font-weight:1000;font-size:12px;box-shadow:0 18px 48px rgba(0,0,0,.55)}
.tube.wallpos{transform:rotate(90deg);transform-origin:50% 50%}
.beam{position:absolute;transition:.5s;z-index:2;pointer-events:none}
.beam.vertical{top:35%;width:310px;height:235px;clip-path:polygon(45% 0,55% 0,100% 100%,0 100%)}
.beam.horizontal{top:24%;width:240px;height:160px;clip-path:polygon(0 45%,0 55%,100% 100%,100% 0)}
.beam.exposing{filter:brightness(1.6) saturate(1.4);animation:beamFlash .55s ease}
@keyframes beamFlash{0%{filter:brightness(2.2) saturate(1.6)}100%{filter:brightness(1) saturate(1)}}
.console{position:absolute;left:20px;bottom:84px;display:flex;gap:8px;align-items:center;padding:7px 12px;background:rgba(2,6,23,.78);border:1px solid var(--border);border-radius:14px;color:#cffafe;font-size:10px;font-weight:1000;letter-spacing:.16em;z-index:14;text-transform:uppercase}
.console .led{width:8px;height:8px;border-radius:999px;background:#22d3ee;box-shadow:0 0 8px #22d3ee;animation:ledBlink 1.6s ease-in-out infinite}
@keyframes ledBlink{0%,100%{opacity:.4}50%{opacity:1}}
.snapshot{position:absolute;right:20px;bottom:84px;display:flex;gap:14px;align-items:center;padding:7px 12px;background:rgba(2,6,23,.78);border:1px solid var(--border);border-radius:14px;color:#cffafe;font-size:10px;font-weight:1000;letter-spacing:.12em;z-index:14;text-transform:uppercase}
.snapshot small{color:var(--muted);font-size:9px;letter-spacing:.16em;display:block}
.snapshot b{font-size:12px;color:#e2e8f0;display:block;margin-top:1px}
.expose-flash{position:absolute;inset:0;background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.85),rgba(255,255,255,0) 60%);opacity:0;pointer-events:none;z-index:21}
.expose-flash.show{animation:exposeFlash .6s ease-out}
@keyframes exposeFlash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
.collimator{position:absolute;border:1.5px dashed rgba(34,211,238,.4);border-radius:6px;pointer-events:none;z-index:1;transition:.4s}
.order-card{position:absolute;left:22px;top:22px;max-width:min(320px,78%);padding:16px;border:1px solid rgba(103,232,249,.42);background:rgba(0,0,0,.44);border-radius:24px;backdrop-filter:blur(10px);z-index:12}
.order-card .region{font-size:28px;font-weight:1000;margin-top:4px}
.sidbar{margin-top:14px;background:rgba(2,6,23,.72);border:1px solid var(--border2);border-radius:18px;padding:10px 16px 14px;backdrop-filter:blur(6px)}
.dial-row{display:flex;gap:14px;align-items:flex-start}
.dial-col{flex:1;min-width:0;text-align:center}
.dial-col .dial-head{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:900;color:#e2e8f0;letter-spacing:.08em;text-transform:uppercase}
.dial-col .dial-head b{color:#cffafe;font-size:14px;font-variant-numeric:tabular-nums}
.dial-svg{width:100%;max-width:240px;display:block;margin:2px auto 0;touch-action:none}
.dial-svg.locked{touch-action:auto;pointer-events:none}
.overlay{position:absolute;inset:0;z-index:22;display:flex;align-items:center;justify-content:center;text-align:center;pointer-events:none;background:rgba(2,6,23,.32);font-size:clamp(42px,7vw,90px);font-weight:1000;letter-spacing:-.05em}
.overlay.good{color:var(--green)}
.overlay.bad{color:var(--red)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#0f172a;border:1px solid var(--border);border-radius:18px;padding:14px}
.stat small{display:block;color:var(--muted);font-weight:800}
.stat b{display:block;font-size:22px;margin-top:3px}
.progress{height:11px;background:#1e293b;border-radius:999px;overflow:hidden;margin-top:12px}
.progress>div{height:100%;width:0%;background:linear-gradient(90deg,#22d3ee,#6ee7b7);transition:.25s}
.choices{display:grid;gap:12px}
.choice-card{background:rgba(2,6,23,.72);border:1px solid var(--border);border-radius:24px;padding:14px}
.choice-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;font-weight:1000}
.tiles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.tiles.long{grid-template-columns:1fr}
.tile{border:1px solid var(--border);background:#0f172a;color:#e2e8f0;border-radius:17px;padding:12px;text-align:left;font-weight:800;cursor:pointer;min-height:46px;transition:.16s;overflow-wrap:anywhere}
.tile:hover{border-color:var(--cyan);background:#172033}
.tile.selected{border-color:var(--cyan);background:rgba(34,211,238,.18);color:#cffafe;transform:translateY(-1px)}
.tile.ok{border-color:var(--green);background:rgba(16,185,129,.18);color:#d1fae5;box-shadow:0 0 24px rgba(16,185,129,.16)}
.tile.bad{border-color:var(--red);background:rgba(244,63,94,.18);color:#ffe4e6}
.tile small{display:inline-block;margin-left:5px;font-weight:1000}
.tile.marker-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px}
.tile.marker-tile small{margin-left:0}
.hint{margin-top:10px;border:1px solid rgba(253,164,175,.44);background:rgba(136,19,55,.36);color:#ffe4e6;padding:10px;border-radius:16px;font-size:12px;line-height:1.45}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.actions .btn.primary{flex:1 1 220px}
.review{margin-top:12px}
.review-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;font-size:14px}
.review-grid .wide{grid-column:1/-1}
.log-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
@media(max-width:1100px){.log-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:620px){
  .app{padding:14px}.hero{align-items:stretch}.hero .btn{width:100%}
  .room{height:460px;min-height:460px;border-radius:24px}
  .wall-bucky{right:9%;top:18%;width:62px;height:154px;font-size:10px;padding-top:14px}
  .table{left:8%;bottom:26%;width:68%;height:48px}.table::after{display:none}
  .patient.lying{left:16%;bottom:37%;width:178px;height:30px}.patient.lying::after{width:50px;height:50px;top:-10px;right:-12px}
  .patient.standing{right:11%;top:18%;width:38px;height:150px}.patient.standing::after{width:38px;height:38px;top:-22px}
  .tube{width:92px}.tube-stem{height:82px;width:14px}.tube-head{height:48px;font-size:10px}
  .beam.vertical{top:31%;width:180px;height:160px}
  .beam.horizontal{top:24%;width:140px;height:100px}
  .order-card{left:12px;top:12px;padding:12px}.order-card .region{font-size:21px}
  .sidbar{margin-top:10px;padding:8px 12px 12px}
  .dial-svg{max-width:170px}
  .ir-btns{gap:6px} .ir-btn{padding:13px 8px;font-size:13px}
  .console,.snapshot{display:none}
  .tiles{grid-template-columns:1fr}.review-grid{grid-template-columns:1fr}.log-grid{grid-template-columns:1fr}
}
.modeBar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{display:inline-flex;background:#0f172a;border:1px solid var(--border);border-radius:14px;padding:4px;gap:4px}
.tab{background:transparent;border:none;color:var(--muted);padding:10px 18px;border-radius:10px;font-weight:1000;cursor:pointer;font-size:13px;letter-spacing:.04em;text-transform:uppercase;transition:.18s}
.tab.active{background:linear-gradient(180deg,#0891b2,#0e7490);color:white;box-shadow:0 8px 18px rgba(8,145,178,.32)}
.tab:hover:not(.active){color:var(--text)}
.picker-card{margin-top:14px}
.picker-regions{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 16px}
.region-chip{border:1px solid var(--border);background:#0f172a;color:#e2e8f0;padding:14px 24px;border-radius:999px;font-weight:900;cursor:pointer;font-size:16px;transition:.16s}
.region-chip:hover{border-color:var(--cyan)}
.region-chip.active{border-color:var(--cyan);background:rgba(34,211,238,.22);color:#cffafe;box-shadow:0 0 18px rgba(34,211,238,.18)}
.routine-block{background:rgba(2,6,23,.55);border:1px solid var(--border);border-radius:20px;padding:14px;margin-top:10px}
.routine-name{font-weight:1000;color:#cffafe;font-size:20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.routine-region{font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-weight:1000}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px}
.group-card{background:#0f172a;border:1px solid var(--border);border-radius:22px;padding:20px 14px;cursor:pointer;transition:.18s;text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
.group-card:hover{border-color:var(--cyan);background:#172033;transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,211,238,.12)}
.group-card-title{font-weight:1000;color:#cffafe;font-size:14px;line-height:1.3}
.group-card-meta{font-size:12px;color:var(--muted);font-weight:800}
.group-back{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:8px 14px;font-weight:900;font-size:13px;cursor:pointer;margin-bottom:10px}
.group-back:hover{border-color:var(--cyan);color:var(--text)}
.routine-title-link{cursor:pointer;text-decoration:underline;text-decoration-color:rgba(103,232,249,.35);text-underline-offset:3px}
.routine-title-link:hover{color:var(--cyan)}
@media(max-width:620px){.group-grid{grid-template-columns:1fr 1fr}}
.sim-hero-title{transition:.18s;background:linear-gradient(135deg,#cffafe,#67e8f9,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.08;padding-bottom:.12em;margin-bottom:-.08em}

.hero-action-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.btn.hero-action{background:linear-gradient(160deg,#0c2d48,#0f172a);border:1.5px solid rgba(103,232,249,.5);color:#cffafe;border-radius:20px;padding:16px 24px;font-size:15px;font-weight:1000;cursor:pointer;display:flex;align-items:center;gap:8px;flex:1 1 180px;justify-content:center;letter-spacing:.03em;box-shadow:0 8px 28px rgba(0,0,0,.28),inset 0 1px 0 rgba(103,232,249,.15)}
.btn.hero-action:hover{border-color:var(--cyan);background:linear-gradient(160deg,#173554,#172033);box-shadow:0 12px 32px rgba(34,211,238,.18),inset 0 1px 0 rgba(103,232,249,.2);transform:translateY(-1px)}
@media(max-width:480px){.btn.hero-action{padding:14px 18px;font-size:14px}}
.view-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.view-tile{border:1px solid var(--border);background:#0f172a;color:#e2e8f0;border-radius:12px;padding:8px 10px;font-weight:900;cursor:pointer;text-align:left;transition:.16s;font-size:13px}
.view-tile:hover{border-color:var(--cyan);background:#172033;transform:translateY(-1px)}
.view-tile small{display:block;color:var(--muted);font-size:11px;font-weight:800;margin-top:3px}
@media(max-width:620px){.tab{padding:9px 12px;font-size:12px}.view-tiles{grid-template-columns:1fr}}
.checklist{list-style:none;padding:0;margin:8px 0}
.checklist li{padding:6px 0;border-bottom:1px solid var(--border);color:#cbd5e1;font-size:13px}
.checklist li:last-child{border-bottom:none}
.checklist li::before{content:"✦ ";color:var(--cyan);font-weight:900}
.skull-tip{background:linear-gradient(135deg,rgba(8,47,73,.78),rgba(15,23,42,.88));border:1px solid rgba(103,232,249,.32);border-radius:20px;padding:14px;margin-top:10px}

/* ---- Phase 1 additions ---- */
.modeBar .hardtoggle{background:linear-gradient(180deg,#1e293b,#0f172a);border:2px solid var(--border2);color:#e2e8f0;text-transform:uppercase;padding:13px 22px;font-size:13px;border-radius:16px;letter-spacing:.08em;font-weight:1000;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.modeBar .hardtoggle:hover{border-color:#94a3b8;background:#243048}
.modeBar .hardtoggle.active{background:linear-gradient(180deg,#b45309,#92400e);color:#fff;border-color:#f59e0b;box-shadow:0 8px 24px rgba(245,158,11,.4)}
.editbtn{padding:8px 12px;font-size:12px;border-radius:12px;margin-top:6px}
.hardin{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hardin input{flex:1 1 140px;background:#0f172a;border:1px solid var(--border2);color:var(--text);border-radius:14px;padding:12px 14px;font-weight:800;font-size:16px}
.hardin input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.18)}
.hardval{font-weight:900;font-size:13px;min-width:120px}
.hardval.ok{color:var(--green)}

<script>
/* =========================================================================
   Room3D - real WebGL exam room (Three.js). Replaces the SVG pseudo-3D room.
   Persistent renderer/canvas survives the app's innerHTML re-renders by being
   re-parented into #room3d-mount each cycle. State is passed via data-* attrs.
   ========================================================================= */
var Room3D=(function(){
  var T=(typeof window!=="undefined"&&window.THREE)||(typeof THREE!=="undefined"?THREE:null);
  var ok=false, ready=false;
  var renderer,scene,camera,clock;
  var obj={}; // named scene objects
  var cur={pose:"lying",bucky:"table",sid:"40",cr:0,dir:0,horiz:false,region:"Chest",fb:"",dim:1};
  // camera orbit state (spherical around target)
  var orbit={theta:-0.9,phi:1.02,radius:5.4,tTheta:-0.9,tPhi:1.02,tRadius:5.4,target:null};
  var drag={active:false,x:0,y:0,pinch:0};

  /* ---- Pose templates: patient-body basis (world images of local +x,+y,+z), station position, and beam axis. ---- */
  function V(a){return new T.Vector3(a[0],a[1],a[2]);}
  function rotY(v,deg){return v.clone().applyAxisAngle(new T.Vector3(0,1,0),T.MathUtils.degToRad(deg));}
  var UP_STATION=[1.4,0.95,-1.55], TBL_STATION=[0.0,0.9,0.0];
  function tpl(name){
    // returns {LX,LY,LZ, pos, beam}. beam: 'down' table vertical, 'inZ' wall horizontal, 'crossZ' horizontal beside supine, 'up' axial.
    switch(name){
      case "SUP":   return {LX:V([0,0,1]),  LY:V([1,0,0]), LZ:V([0,1,0]),  pos:TBL_STATION, beam:"down"};
      case "PRONE": return {LX:V([0,0,-1]), LY:V([1,0,0]), LZ:V([0,-1,0]), pos:[0,0.92,0],  beam:"down"};
      case "TBL_LAT_L": return {LX:V([0,-1,0]),LY:V([1,0,0]),LZ:V([0,0,1]), pos:[0.15,0.95,0],  beam:"down"}; // lying on LEFT side (shifted so feet stay on the table)
      case "TBL_LAT_R": return {LX:V([0,1,0]), LY:V([1,0,0]),LZ:V([0,0,-1]),pos:[0.15,0.95,0],  beam:"down"};
      case "SUP_XT":return {LX:V([0,0,1]),  LY:V([1,0,0]), LZ:V([0,1,0]),  pos:TBL_STATION, beam:"crossZ"}; // supine, horizontal beam (cross-table)
      case "UP_AP": return {LX:V([1,0,0]),  LY:V([0,1,0]), LZ:V([0,0,1]),  pos:UP_STATION,  beam:"inZ"};
      case "UP_PA": return {LX:V([-1,0,0]), LY:V([0,1,0]), LZ:V([0,0,-1]), pos:UP_STATION,  beam:"inZ"};
      case "UP_LAT_L": return {LX:V([0,0,-1]),LY:V([0,1,0]),LZ:V([1,0,0]),  pos:UP_STATION,  beam:"inZ"}; // left side to bucky
      case "UP_LAT_R": return {LX:V([0,0,1]), LY:V([0,1,0]),LZ:V([-1,0,0]), pos:UP_STATION,  beam:"inZ"};
      case "UP_RPO": return {LX:rotY(V([1,0,0]),-45),LY:V([0,1,0]),LZ:rotY(V([0,0,1]),-45), pos:UP_STATION, beam:"inZ"};
      case "UP_LPO": return {LX:rotY(V([1,0,0]),45), LY:V([0,1,0]),LZ:rotY(V([0,0,1]),45),  pos:UP_STATION, beam:"inZ"};
      case "UP_RPO30": return {LX:rotY(V([1,0,0]),-30),LY:V([0,1,0]),LZ:rotY(V([0,0,1]),-30),pos:UP_STATION,beam:"inZ"};
      case "UP_LPO30": return {LX:rotY(V([1,0,0]),30), LY:V([0,1,0]),LZ:rotY(V([0,0,1]),30), pos:UP_STATION,beam:"inZ"};
      case "UP_RAO": return {LX:rotY(V([-1,0,0]),45),LY:V([0,1,0]),LZ:rotY(V([0,0,-1]),45), pos:UP_STATION, beam:"inZ"};
      case "UP_LAO": return {LX:rotY(V([-1,0,0]),-45),LY:V([0,1,0]),LZ:rotY(V([0,0,-1]),-45),pos:UP_STATION,beam:"inZ"};
      case "TBL_RPO": { var br=tpl("SUP"),ax=new T.Vector3(1,0,0),a=T.MathUtils.degToRad(-35); return {LX:br.LX.clone().applyAxisAngle(ax,a),LY:br.LY,LZ:br.LZ.clone().applyAxisAngle(ax,a),pos:br.pos,beam:"down"}; }
      case "TBL_LPO": { var bl=tpl("SUP"),ax2=new T.Vector3(1,0,0),a2=T.MathUtils.degToRad(35); return {LX:bl.LX.clone().applyAxisAngle(ax2,a2),LY:bl.LY,LZ:bl.LZ.clone().applyAxisAngle(ax2,a2),pos:bl.pos,beam:"down"}; }
      case "SEATED_TABLE": return {LX:V([-1,0,0]),LY:V([0,1,0]),LZ:V([0,0,-1]),pos:[0,0.46,0.62],beam:"down"}; // seated at the tabletop, facing the table
      case "STAND_TABLE": return {LX:V([-1,0,0]),LY:V([0,1,0]),LZ:V([0,0,-1]),pos:[0,0.95,0.6],beam:"down"}; // standing at the tabletop edge, facing the table
      case "SEATED_TABLE_XT": { var stx=tpl("SEATED_TABLE"); return {LX:stx.LX,LY:stx.LY,LZ:stx.LZ,pos:stx.pos,beam:"crossX"}; } // seated at the table, horizontal (cross-table) beam
      case "SEATED_AXIAL_R": return {LX:V([0,0,1]),LY:V([0,1,0]),LZ:V([-1,0,0]),pos:[0,0.46,0.65],beam:"down"}; // seated turned 90°, RIGHT side toward table(-Z)
      case "SEATED_AXIAL_L": return {LX:V([0,0,-1]),LY:V([0,1,0]),LZ:V([1,0,0]),pos:[0,0.46,0.65],beam:"down"};  // seated turned 90°, LEFT side toward table(-Z)
      case "UP_RAO20": { var br20=tpl("UP_AP"),a20=T.MathUtils.degToRad(20),ax20=new T.Vector3(0,1,0); return {LX:br20.LX.clone().applyAxisAngle(ax20,a20),LY:br20.LY,LZ:br20.LZ.clone().applyAxisAngle(ax20,a20),pos:br20.pos,beam:"inZ"}; }
      case "UP_LAO20": { var bl20=tpl("UP_AP"),al20=T.MathUtils.degToRad(-20),axl20=new T.Vector3(0,1,0); return {LX:bl20.LX.clone().applyAxisAngle(axl20,al20),LY:bl20.LY,LZ:bl20.LZ.clone().applyAxisAngle(axl20,al20),pos:bl20.pos,beam:"inZ"}; }
    }
    return tpl("SUP");
  }

  /* ---- Resolve a projection to a pose spec {tplName, limbs[], sideDefault, beamOverride} ---- */
  function poseSpec(region,view,lat,ir,pt){
    var vl=(view||"").toLowerCase(), p=(pt||"").toLowerCase(), il=(ir||"").toLowerCase();
    var upright = il.indexOf("wall")>=0 || /erect|seated|upright|standing/.test(p);
    var prone = /prone/.test(p);
    var horiz = /crosstable|cross-table|transthoracic|swimmer|axiolateral|horizontal|superoinferior/.test(vl) || /horizontal beam|cr horizontal/.test(p);
    var limbs=[];
    // limb detail from view/pt keywords
    if(/frog/.test(vl)) limbs.push("frog");
    // foot AP/oblique knee-flex is handled in the supine branch below; ankle stays straight (toes up)
    if(/across stomach|hand across|across the chest/.test(p)||/shoulder y|scap y/.test(vl)) limbs.push("armAcross");
    if(/transthoracic|swimmer/.test(vl)) limbs.push("armsUpOne");
    if(/rotated medially|internal/.test(vl+p)&&region==="Shoulder") limbs.push("shIntRot");
    if(/rotated laterally|external/.test(vl+p)&&region==="Shoulder") limbs.push("shExtRot");
    if(/tuck/.test(p)) limbs.push("headTuck");
    if(/waters/.test(vl)) limbs.push("headUp"); // Waters: chin/face raised, looking up
    if(/smv/.test(vl)) limbs.push("smvLean"); // SMV: lean back, neck extended, vertex toward IR
    // special-case orientations that the generic keyword engine would get wrong
    if(/shoulder y|scap y/.test(vl)) return {name:(lat==="right")?"UP_LPO30":"UP_RPO30", limbs:["handOnOppShoulder"]}; // face away from board, slight oblique, affected hand on opposite shoulder
    if(/transthoracic/.test(vl)) return {name:(lat==="right")?"UP_LAT_R":"UP_LAT_L", limbs:["armUpUnaffected"]}; // injured arm stays at the side; UNAFFECTED arm raised overhead
    if(/swimmer/.test(vl)) return {name:"TBL_LAT_L", limbs:["armsUpOne","kneesBent"]}; // recumbent lateral on the table, one arm up
    if(region==="Humerus"&&/lateral/.test(vl)) return {name:"UP_AP", limbs:["handOnHip"]}; // body stays AP; arm internally rotated, back of hand on hip
    if(region==="Shoulder"&&/superoinferior|axillary/.test(vl)) return {name:(lat==="right")?"SEATED_AXIAL_R":"SEATED_AXIAL_L", limbs:["sit","axialLean"]}; // seated, turned 90° so the affected side leans over the table, beam superoinferior
    if(region==="Scapula"&&/^ap$/i.test(view)) return {name:"UP_PA", limbs:["handOnForehead"]}; // facing the board, affected back-of-hand on forehead
    if(region==="Nasal Bones"&&/lateral/.test(vl)) return {name:/right/.test(vl)?"UP_LAT_R":"UP_LAT_L", limbs:["sit"], seated:true}; // side comes from the view (right = right side to IR)
    if(/waters/.test(vl)) return {name:"UP_PA", limbs:["headUp","sit"], seated:true}; // Waters: face the board, chin/face raised
    if(region==="Hip"&&/axiolateral/.test(vl)) return {name:"SUP_XT", limbs:["legRaisedUnaffected","armsCrossedChest"]}; // supine mediolateral; unaffected leg raised, arms crossed on chest
    // distal upper extremity at the table (these pt texts say "Seated"/"Supine", which would otherwise send the generic engine to the wall or the tabletop)
    var tableUE=/^(Hand|Wrist|Forearm|Elbow|Thumb\/Finger)$/.test(region);
    if(tableUE&&/partial/.test(vl)) return {name:"STAND_TABLE", limbs:["armOnTableStand"]}; // stand beside the table, affected arm resting on it
    if(tableUE&&/coyle/.test(vl)) return {name:"SEATED_TABLE", limbs:["sit","armOnTable"]}; // sit on the stool at the table, arm on the tabletop
    if(tableUE&&(horiz||/trauma lateral/.test(vl))) return {name:"SEATED_TABLE_XT", limbs:["sit","armOnTable"]}; // sit at the table, arm on the tabletop, horizontal beam
    // Spine laterals (incl. flexion/extension, L5/S1 spot): recumbent lateral on the table, or ERECT lateral for C-spine
    if(/^(T-Spine|Lumbar|Sacrum\/Coccyx|C-Spine)$/.test(region)&&!horiz&&(/lateral|flexion|extension|l5\/s1/.test(vl)||/left lateral|right lateral/.test(p))){
      var sdp=/right lateral/.test(p)?"right":"left";
      if(upright) return {name:sdp==="right"?"UP_LAT_R":"UP_LAT_L", limbs:[]};
      return {name:sdp==="right"?"TBL_LAT_R":"TBL_LAT_L", limbs:["spinePrayer","kneesBent"]};
    }
    var name;
    if(upright){
      if(/lateral/.test(vl)) name=(lat==="right")?"UP_LAT_R":"UP_LAT_L";
      else if(/rpo/.test(vl)) name="UP_RPO";
      else if(/lpo/.test(vl)) name="UP_LPO";
      else if(/rao/.test(vl)) name="UP_RAO";
      else if(/lao|oblique left/.test(vl)) name="UP_LAO";
      else if(/oblique right/.test(vl)) name="UP_RPO";
      else if(/oblique/.test(vl)) name=(lat==="right")?"UP_RPO":"UP_LPO";
      else if(/(^|[^a-z])pa([^a-z]|$)|caldwell|rhese/.test(vl) && !/ap/.test(vl)) name="UP_PA";
      else name="UP_AP";
    }else{
      var kneeGroup=/^(Knee|Femur|Tib-Fib|Patella)$/.test(region);   // roll onto the affected side
      var footGroup=/^(Foot|Ankle|Calcaneus)$/.test(region);          // stay supine, externally rotate the leg
      var distalUE=/^(Hand|Wrist|Forearm|Elbow|Thumb\/Finger)$/.test(region); // seated at the tabletop
      var spineReg=/spine|lumbar|sacrum|coccyx|t-spine|c-spine|abdomen/i.test(region);
      if(distalUE&&!horiz){ name="SEATED_TABLE"; limbs.push("sit","armOnTable"); }
      else if(/sulcus|settegast/.test(vl)){ name="PRONE"; limbs.push("kneeFlexAcute"); }
      else if(horiz){ name="SUP_XT"; }
      else if(/rpo/.test(vl)) name="TBL_RPO";
      else if(/lpo/.test(vl)) name="TBL_LPO";
      else if(/rao/.test(vl)){ name="PRONE"; limbs.push("obliqueR"); }
      else if(/lao|oblique left/.test(vl)){ name="PRONE"; limbs.push("obliqueL"); }
      else if(/lateral/.test(vl)&&!/oblique/.test(vl)){ // true laterals only - "Lateral Oblique" stays supine
        if(spineReg||kneeGroup){ name=(lat==="right")?"TBL_LAT_R":"TBL_LAT_L"; if(kneeGroup) limbs.push("kneeLateralPose"); }
        else if(footGroup){ name=(lat==="right")?"TBL_LAT_R":"TBL_LAT_L"; limbs.push("footLateralRoll"); }
        else { name= prone?"PRONE":"SUP"; limbs.push("limbLateral"); }
      }
      else { name = prone?"PRONE":"SUP"; if(region==="Foot") limbs.push("kneeFlex"); } // foot AP/oblique: knee up, sole flat on IR
    }
    if(region==="Chest"&&/lateral/.test(vl)) limbs.push("armsForwardUp");   // raise arms forward/up out of the chest
    if(region==="Sternum"&&/lateral/.test(vl)) limbs.push("armsBehind");     // draw arms behind the back
    var cranial=/^(Skull|Facial Bones|Nasal Bones|Sinuses|Orbits)$/.test(region);
    var seated = cranial && name.indexOf("UP_")===0;
    if(seated) limbs.push("sit");
    return {name:name, limbs:limbs, seated:seated};
  }

  /* ---- Articulated patient rig (pelvis-origin, standing rest pose) ---- */
  function joint(parent,px,py,pz){var g=new T.Group();g.position.set(px,py,pz);parent.add(g);return g;}
  function capsuleDown(parent,len,r,mat2){var m=new T.Mesh(new T.CapsuleGeometry(r,len,5,12),mat2);m.position.y=-len/2;parent.add(m);return m;}
  function buildRig(){
    var g=new T.Group(); var skin=mat(0xe7edf5,{rough:0.85,metal:0});
    var j={};
    // torso/pelvis
    var pelvis=new T.Mesh(new T.CapsuleGeometry(0.15,0.12,6,14),skin); pelvis.rotation.x=Math.PI/2; pelvis.position.y=-0.02; g.add(pelvis);
    j.spine=joint(g,0,0.02,0);
    var torso=new T.Mesh(new T.CapsuleGeometry(0.16,0.4,6,16),skin); torso.position.y=0.26; j.spine.add(torso);
    // head/neck
    j.head=joint(j.spine,0,0.5,0.02);
    var neck=new T.Mesh(new T.CylinderGeometry(0.055,0.065,0.09,12),skin); neck.position.y=0.03; j.head.add(neck);
    var head=new T.Mesh(new T.SphereGeometry(0.115,20,16),skin); head.position.y=0.16; head.scale.z=1.1; j.head.add(head);
    // arms (shoulder pivot -> upperarm -> elbow -> forearm -> hand)
    j.shL=joint(j.spine,0.2,0.46,0); var uaL=capsuleDown(j.shL,0.26,0.05,skin);
    j.elL=joint(j.shL,0,-0.28,0); var faL=capsuleDown(j.elL,0.24,0.045,skin);
    var handL=new T.Mesh(new T.BoxGeometry(0.09,0.13,0.04),skin); handL.position.y=-0.28; j.elL.add(handL);
    j.shR=joint(j.spine,-0.2,0.46,0); var uaR=capsuleDown(j.shR,0.26,0.05,skin);
    j.elR=joint(j.shR,0,-0.28,0); var faR=capsuleDown(j.elR,0.24,0.045,skin);
    var handR=new T.Mesh(new T.BoxGeometry(0.09,0.13,0.04),skin); handR.position.y=-0.28; j.elR.add(handR);
    // legs (hip -> thigh -> knee -> shin -> foot)
    j.hipL=joint(g,0.1,-0.06,0); var thL=capsuleDown(j.hipL,0.42,0.07,skin);
    j.knL=joint(j.hipL,0,-0.46,0); var shnL=capsuleDown(j.knL,0.4,0.055,skin);
    j.ankL=joint(j.knL,0,-0.44,0); var ftL=new T.Mesh(new T.BoxGeometry(0.1,0.07,0.22),skin); ftL.position.set(0,0,0.06); j.ankL.add(ftL);
    j.hipR=joint(g,-0.1,-0.06,0); var thR=capsuleDown(j.hipR,0.42,0.07,skin);
    j.knR=joint(j.hipR,0,-0.46,0); var shnR=capsuleDown(j.knR,0.4,0.055,skin);
    j.ankR=joint(j.knR,0,-0.44,0); var ftR=new T.Mesh(new T.BoxGeometry(0.1,0.07,0.22),skin); ftR.position.set(0,0,0.06); j.ankR.add(ftR);
    j.footL=ftL; j.footR=ftR; j.handL=handL; j.handR=handR; j.headMesh=head;
    g.userData.j=j; return g;
  }
  function resetJoints(j){["spine","head","shL","elL","shR","elR","hipL","knL","ankL","hipR","knR","ankR"].forEach(function(k){if(j[k])j[k].rotation.set(0,0,0);});}
  function applyLimbs(j,limbs,side){
    resetJoints(j);
    // slight natural default: arms a touch out
    j.shL.rotation.z=0.08; j.shR.rotation.z=-0.08;
    var near = side==="right" ? "R":"L"; // affected side for unilateral tweaks
    (limbs||[]).forEach(function(l){
      if(l==="armsUpOne"){ (near==="R"?j.shR:j.shL).rotation.x=-2.7; }
      else if(l==="armUpUnaffected"){ ((near==="R"?"L":"R")==="R"?j.shR:j.shL).rotation.x=-2.7; } // transthoracic: raise the arm OPPOSITE the affected side
      else if(l==="armOnTableStand"){ var asd=near, osd=(near==="R"?"L":"R"); j.spine.rotation.x=-0.22; (asd==="R"?j.shR:j.shL).rotation.x=-0.5; (asd==="R"?j.elR:j.elL).rotation.x=-0.3; (osd==="R"?j.shR:j.shL).rotation.x=0.05; } // standing at the table, leaning slightly, affected arm angled down to rest on the tabletop
      else if(l==="armAcross"){ j.shL.rotation.x=-1.2; j.elL.rotation.x=-1.7; j.shR.rotation.x=-1.0; j.elR.rotation.x=-1.5; }
      else if(l==="armsForwardUp"){ j.shL.rotation.x=-1.7; j.shR.rotation.x=-1.7; j.elL.rotation.x=-0.4; j.elR.rotation.x=-0.4; }
      else if(l==="armsBehind"){ j.shL.rotation.x=0.6; j.shR.rotation.x=0.6; j.elL.rotation.x=-1.0; j.elR.rotation.x=-1.0; }
      else if(l==="axialLean"){ var afx=near; j.spine.rotation.z=(afx==="R"?0.15:-0.15); var sx=(afx==="R"?j.shR:j.shL), ex=(afx==="R"?j.elR:j.elL); sx.rotation.z=(afx==="R"?-1.5:1.5); sx.rotation.x=-0.15; ex.rotation.x=0; } // slight lean; affected arm abducted ~90° and mostly STRAIGHT, reaching out to rest on the table
      else if(l==="handOnOppShoulder"){ var afs=near, s=(afs==="R"?j.shR:j.shL), e=(afs==="R"?j.elR:j.elL); s.rotation.set(-1.5,(afs==="R"?1.4:-1.4),0); e.rotation.x=-2.2; } // upper arm raised in front and internally rotated; elbow folds the forearm across so the hand rests on the opposite shoulder
      else if(l==="handOnForehead"){ var afd=near, sf=(afd==="R"?j.shR:j.shL), ef=(afd==="R"?j.elR:j.elL); sf.rotation.x=-2.4; ef.rotation.x=-1.9; } // affected arm raised, back of hand on forehead
      else if(l==="handOnHip"){ var afh=near, sh=(afh==="R"?j.shR:j.shL), el=(afh==="R"?j.elR:j.elL); sh.rotation.set(0.3,(afh==="R"?-1.0:1.0),0); el.rotation.x=1.7; } // affected arm internally rotated, elbow flexed, back of hand on hip
      else if(l==="armOnTable"){ var af=near, op=(near==="R"?"L":"R"); j.spine.rotation.x=-0.1; (af==="R"?j.shR:j.shL).rotation.x=-1.3; (af==="R"?j.elR:j.elL).rotation.x=0; (op==="R"?j.shR:j.shL).rotation.x=-0.5; (op==="R"?j.elR:j.elL).rotation.x=-1.3; } // affected arm fully STRAIGHT (elbow=0), angled gently down onto the table; other arm in lap
      else if(l==="shIntRot"){ (near==="R"?j.shR:j.shL).rotation.y=0.9; }
      else if(l==="shExtRot"){ (near==="R"?j.shR:j.shL).rotation.y=-0.9; }
      else if(l==="kneeFlex"){ (near==="R"?j.hipR:j.hipL).rotation.x=-0.6; (near==="R"?j.knR:j.knL).rotation.x=1.2; (near==="R"?j.ankR:j.ankL).rotation.x=-1.75; } // affected leg: knee up, ankle dorsiflexed so the sole (incl. heel) lies flat on the IR; other leg straight
      else if(l==="frog"){ j.hipL.rotation.set(-0.4,0,0.6); j.knL.rotation.x=1.7; j.hipR.rotation.set(-0.4,0,-0.6); j.knR.rotation.x=1.7; }
      else if(l==="limbLateral"){ (near==="R"?j.shR:j.shL).rotation.z=(near==="R"?-1.2:1.2); }
      else if(l==="spinePrayer"){ j.shL.rotation.set(-1.5,0,-0.4); j.shR.rotation.set(-1.5,0,0.4); j.elL.rotation.x=-0.7; j.elR.rotation.x=-0.7; } // both arms forward and brought together in front (prayer hands), elbows slightly bent, lifted off the table
      else if(l==="kneesBent"){ j.hipL.rotation.x=-0.3; j.knL.rotation.x=0.6; j.hipR.rotation.x=-0.3; j.knR.rotation.x=0.6; } // knees slightly bent
      else if(l==="legRaisedUnaffected"){ var un=(near==="R"?"L":"R"); (un==="R"?j.hipR:j.hipL).rotation.x=-1.3; (un==="R"?j.knR:j.knL).rotation.x=1.5; } // raise/flex the unaffected leg out of the way
      else if(l==="armsCrossedChest"){ j.shL.rotation.set(-1.4,0,0.5); j.elL.rotation.x=-1.9; j.shR.rotation.set(-1.4,0,-0.5); j.elR.rotation.x=-1.9; } // both arms raised above and crossed over the chest
      else if(l==="kneeFlexAcute"){ j.hipL.rotation.x=-0.3; j.knL.rotation.x=2.0; j.hipR.rotation.x=-0.3; j.knR.rotation.x=2.0; }
      else if(l==="obliqueR"){ j.spine.rotation.y=0.5; }
      else if(l==="obliqueL"){ j.spine.rotation.y=-0.5; }
      else if(l==="sit"){ j.hipL.rotation.x=-1.5; j.hipR.rotation.x=-1.5; j.knL.rotation.x=1.5; j.knR.rotation.x=1.5; }
      else if(l==="kneeLateralPose"){ var farK=(near==="R"?"L":"R");
        (near==="R"?j.hipR:j.hipL).rotation.x=0.35; (near==="R"?j.knR:j.knL).rotation.x=0.5;   // affected leg swings back + slight knee flex
        (farK==="R"?j.hipR:j.hipL).rotation.x=-0.9; (farK==="R"?j.knR:j.knL).rotation.x=0.8; (farK==="R"?j.hipR:j.hipL).rotation.z=(farK==="R"?0.5:-0.5); } // opposite leg forward + dropped so the foot rests on the table
      else if(l==="footLateralRoll"){ var farF=(near==="R"?"L":"R"); (near==="R"?j.knR:j.knL).rotation.x=0.1; (farF==="R"?j.hipR:j.hipL).rotation.x=-0.9; (farF==="R"?j.knR:j.knL).rotation.x=0.8; (farF==="R"?j.hipR:j.hipL).rotation.z=(farF==="R"?0.5:-0.5); } // affected leg stays extended (foot on table), opposite leg forward out of the way
      else if(l==="headTuck"){ j.head.rotation.x=0.4; }
      else if(l==="headUp"){ j.head.rotation.x=-0.5; } // chin/face raised, looking up
      else if(l==="smvLean"){ j.spine.rotation.x=-0.5; j.head.rotation.x=-1.1; } // recline back, head extended, vertex toward IR
    });
  }
  function applyPose(rig,spec,side){
    var j=rig.userData.j; applyLimbs(j,spec.limbs,side);
    var t=tpl(spec.name);
    var m=new T.Matrix4().makeBasis(t.LX.clone().normalize(),t.LY.clone().normalize(),t.LZ.clone().normalize());
    rig.quaternion.setFromRotationMatrix(m);
    rig.position.set(t.pos[0],t.pos[1],t.pos[2]);
    if(spec.seated){ rig.position.y-=0.42; rig.position.z-=0.35; if((spec.limbs||[]).indexOf("smvLean")>=0) rig.position.z+=0.5; } // seated cranial: drop to stool height and move closer to the board (SMV moves away so the lean-back clears it)
    return t;
  }

  function build(){
    scene=new T.Scene();
    scene.background=new T.Color(0x05070f);
    scene.fog=new T.Fog(0x05070f,18,44);
    camera=new T.PerspectiveCamera(42,1.4,0.1,100);
    orbit.target=new T.Vector3(0,0.95,0);

    // lights
    scene.add(new T.AmbientLight(0x24304a,1.1));
    var key=new T.DirectionalLight(0xbfe9ff,1.15); key.position.set(3,6,4); scene.add(key);
    var fill=new T.PointLight(0x67e8f9,0.5,20); fill.position.set(-3,3,3); scene.add(fill);
    var rim=new T.PointLight(0xa855f7,0.35,20); rim.position.set(2,3,-4); scene.add(rim);

    // floor
    var floor=new T.Mesh(new T.PlaneGeometry(20,20),mat(0x0b1120,{rough:0.9,metal:0.15}));

    var grid=new T.GridHelper(20,40,0x1e3a5f,0x152238); grid.position.y=0.001; scene.add(grid);
    // back + side walls
    var wallMat=mat(0x0f1a2e,{rough:1,metal:0});
    // Walls are single-sided planes facing INTO the room: from outside they are back-face culled,
    // so orbiting behind them shows the room instead of a black wall backside.
    var backWall=new T.Mesh(new T.PlaneGeometry(24,7),wallMat); backWall.position.set(0,3,-2.3); scene.add(backWall);
    var sideWall=new T.Mesh(new T.PlaneGeometry(14,7),wallMat); sideWall.rotation.y=Math.PI/2; sideWall.position.set(-5.5,3,0); scene.add(sideWall);
    var sideWall2=new T.Mesh(new T.PlaneGeometry(14,7),wallMat); sideWall2.rotation.y=-Math.PI/2; sideWall2.position.set(5.5,3,0); scene.add(sideWall2);

    // x-ray table
    var tableMat=mat(0xdfe7f0,{rough:0.4,metal:0.2});
    var tableTop=box(2.0,0.08,0.62,tableMat); tableTop.position.set(0,0.75,0); scene.add(tableTop); obj.tableTop=tableTop;
    var pedestal=box(0.7,0.7,0.5,mat(0x334155,{rough:0.6,metal:0.4})); pedestal.position.set(0,0.38,0); scene.add(pedestal);
    var buckyTray=box(1.9,0.05,0.5,mat(0x94a3b8,{rough:0.5,metal:0.3})); buckyTray.position.set(0,0.7,0); scene.add(buckyTray); obj.buckyTray=buckyTray;

    // wall bucky (repositioned to centre on the anatomy per projection)
    var wallBucky=box(0.5,0.62,0.1,mat(0xcbd5e1,{rough:0.35,metal:0.3})); wallBucky.position.set(1.4,1.25,-2.05); scene.add(wallBucky); obj.wallBucky=wallBucky;
    var wbFrame=box(0.58,0.7,0.05,mat(0x475569,{rough:0.5,metal:0.5})); wbFrame.position.set(1.4,1.25,-2.12); scene.add(wbFrame); obj.wbFrame=wbFrame;

    // stool (shown for seated cranial projections)
    var stool=new T.Group();
    var seat=cyl(0.17,0.19,0.06,mat(0x334155,{rough:0.6,metal:0.3})); seat.position.y=0.45; stool.add(seat);
    var sleg=cyl(0.02,0.025,0.45,mat(0x475569,{rough:0.4,metal:0.6})); sleg.position.y=0.22; stool.add(sleg);
    stool.visible=false; scene.add(stool); obj.stool=stool;

    // ceiling rails
    var railMat=mat(0x475569,{rough:0.4,metal:0.7});
    var rail1=box(4.2,0.06,0.06,railMat); rail1.position.set(0,2.5,0.28); scene.add(rail1);
    var rail2=box(4.2,0.06,0.06,railMat); rail2.position.set(0,2.5,-0.28); scene.add(rail2);

    // tube assembly (carriage -> column -> tube head -> collimator)
    var tube=new T.Group(); scene.add(tube); obj.tube=tube;
    var carriage=box(0.34,0.1,0.7,mat(0x64748b,{rough:0.4,metal:0.6})); carriage.position.y=2.5; tube.add(carriage); obj.carriage=carriage;
    var column=cyl(0.05,0.05,1.0,mat(0x334155,{rough:0.4,metal:0.6})); tube.add(column); obj.column=column;
    var head=new T.Group(); tube.add(head); obj.head=head;
    var housing=cyl(0.16,0.16,0.34,mat(0x1e293b,{rough:0.4,metal:0.6})); housing.rotation.x=Math.PI/2; head.add(housing);
    var collar=cyl(0.2,0.2,0.06,mat(0x0f172a,{rough:0.5,metal:0.5})); collar.position.y=-0.2; head.add(collar);
    var collimator=box(0.26,0.14,0.26,mat(0x0b1120,{rough:0.6,metal:0.4})); collimator.position.y=-0.28; head.add(collimator);

    // beam cone - volumetric shader (fresnel edge glow + travelling scanlines), from beam-shader.html
    clock=new T.Clock();
    var beamUniforms={ uTime:{value:0}, uColor:{value:new T.Color(0x6ee7b7)}, uAlpha:{value:0.9} };
    var beamMat=new T.ShaderMaterial({
      uniforms:beamUniforms, transparent:true, depthWrite:false, side:T.DoubleSide, blending:T.AdditiveBlending,
      vertexShader:"varying vec3 vN; varying vec3 vView; varying float vAxis;\n"+
        "void main(){ vec4 w=modelMatrix*vec4(position,1.0); vN=normalize(mat3(modelMatrix)*normal);\n"+
        "  vView=normalize(cameraPosition-w.xyz); vAxis=position.y;\n"+
        "  gl_Position=projectionMatrix*viewMatrix*w; }",
      fragmentShader:"precision mediump float; uniform float uTime; uniform vec3 uColor; uniform float uAlpha;\n"+
        "varying vec3 vN; varying vec3 vView; varying float vAxis;\n"+
        "void main(){ float fres=pow(1.0-abs(dot(normalize(vN),normalize(vView))),1.8);\n"+
        "  float scan=0.5+0.5*sin(vAxis*40.0 - uTime*3.0);\n"+
        "  float a=fres*(0.35+0.45*scan)*uAlpha; gl_FragColor=vec4(uColor,a); }"
    });
    var beam=new T.Mesh(new T.ConeGeometry(1,1,40,1,true),beamMat); scene.add(beam); obj.beam=beam; obj.beamMat=beamMat; obj.beamUniforms=beamUniforms;

    // CR target marker
    var crDot=new T.Mesh(new T.SphereGeometry(0.03,16,12),new T.MeshBasicMaterial({color:0xef4444})); scene.add(crDot); obj.crDot=crDot;

    // patient rig (single; re-posed per projection)
    var rig=buildRig(); scene.add(rig); obj.rig=rig;
    // collimation light field (rectangle over the anatomy) + bright border
    var fieldMat=new T.MeshBasicMaterial({color:0xfff6cc,transparent:true,opacity:0.32,depthWrite:false,side:T.DoubleSide});
    var field=new T.Mesh(new T.PlaneGeometry(1,1),fieldMat); scene.add(field); obj.field=field; obj.fieldMat=fieldMat;
    var edgeMat=new T.LineBasicMaterial({color:0xffe58a,transparent:true,opacity:0.85});
    var edge=new T.LineSegments(new T.EdgesGeometry(new T.PlaneGeometry(1,1)),edgeMat); scene.add(edge); obj.fieldEdge=edge;
  }
  function placeField(center,normal,w,l){
    var n=normal.clone().normalize();
    var q=new T.Quaternion().setFromUnitVectors(new T.Vector3(0,0,1),n);
    [obj.field,obj.fieldEdge].forEach(function(o){o.position.copy(center).addScaledVector(n,-0.02);o.quaternion.copy(q);o.scale.set(w,l,1);});
  }

  function crTargetLying(region){var x=(region in LYING_X)?LYING_X[region]:0.12;return new T.Vector3(x,0.9,0);}
  function crTargetStanding(region){var y=(region in STAND_Y)?STAND_Y[region]:1.1;return new T.Vector3(1.4,y,-1.72);}

  // orient+scale the beam cone so its apex sits at `from` and base at `to`
  function aimBeam(from,to,spread,color,opacity){
    var beam=obj.beam; var dir=new T.Vector3().subVectors(to,from); var len=dir.length(); if(len<1e-3)len=1e-3;
    beam.position.copy(from).add(dir.clone().multiplyScalar(0.5));
    var up=new T.Vector3(0,1,0); var q=new T.Quaternion().setFromUnitVectors(up,dir.clone().normalize());
    // cone default apex at +y top; we want apex at from, base at to => flip so tip toward from
    beam.quaternion.copy(q); beam.rotateX(Math.PI);
    beam.scale.set(spread,len,spread);
    obj.beamUniforms.uColor.value.set(color); obj.beamUniforms.uAlpha.value=Math.min(1.6,opacity*4.5);
  }

  function applyState(p){
    if(!ready)return;
    cur=p;
    var region=p.region||"Chest", view=p.view||"", lat=p.lat||"", ir=p.ir||"", pt=p.pt||"";
    var sidIn=parseFloat(p.sid)||40, deg=(+p.cr)||0, dir=(+p.dir)||0;
    var spec=poseSpec(region,view,lat,ir,pt);
    var side = lat || (MIDLINE[region]?null:"left");
    var t=applyPose(obj.rig,spec,side);
    var upright=(t.beam==="inZ");
    obj.wallBucky.visible=upright; obj.wbFrame.visible=upright;
    obj.stool.visible=!!spec.seated||/^SEATED_/.test(spec.name);
    obj.rig.updateMatrixWorld(true);
    // "AP Pelvis Lower" (and any pelvis-survey view) collimates to the whole pelvis, not one hip
    var collimRegion = /pelvis/i.test(view) ? "Pelvis" : (/chest/i.test(view) ? "Chest" : region);
    var to;
    var jt=obj.rig.userData.j;
    // long-bone / joint CR targets track the posed rig so the CR stays on the part
    function jointW(node){ var v=new T.Vector3(); node.getWorldPosition(v); return v; }
    function midW(a,b){ return jointW(a).add(jointW(b)).multiplyScalar(0.5); }
    if(/^(Knee|Patella)$/.test(collimRegion)){ to=jointW(side==="right"?jt.knR:jt.knL); }
    else if(/^(Foot|Ankle|Calcaneus)$/.test(collimRegion)){ to=jointW(side==="right"?jt.footR:jt.footL); }
    else if(collimRegion==="Femur"){ to=midW(side==="right"?jt.hipR:jt.hipL, side==="right"?jt.knR:jt.knL); }
    else if(collimRegion==="Tib-Fib"){ to=midW(side==="right"?jt.knR:jt.knL, side==="right"?jt.footR:jt.footL); }
    else if(/^(Hand|Thumb\/Finger|Wrist)$/.test(collimRegion)){ to=jointW(side==="right"?jt.handR:jt.handL); }
    else if(collimRegion==="Elbow"){ to=jointW(side==="right"?jt.elR:jt.elL); }
    else if(collimRegion==="Forearm"){ to=midW(side==="right"?jt.elR:jt.elL, side==="right"?jt.handR:jt.handL); }
    else if(collimRegion==="Humerus"){ to=midW(side==="right"?jt.shR:jt.shL, side==="right"?jt.elR:jt.elL); }
    else if(collimRegion==="Shoulder"){ to=jointW(side==="right"?jt.shR:jt.shL); }
    else if(/^(Skull|Facial Bones|Nasal Bones|Sinuses|Orbits|Mandible|TMJ)$/.test(collimRegion)){ to=jointW(jt.headMesh); to.y+=0.06; } // CR tracks the actual head (follows tilt), nudged up onto the head
    else { var cs=MIDLINE[collimRegion]?null:side; to=obj.rig.localToWorld(landmarkLocal(collimRegion,cs).clone()); }
    if(spec.name==="SEATED_TABLE") to.y=0.79; // rest the CR/field on the tabletop IR
    var tube=obj.tube, head=obj.head, column=obj.column, carriage=obj.carriage;
    var DOWN=new T.Vector3(0,-1,0), beamDir, from;
    // signed CR angle: + = cephalad, - = caudad
    var angS=(dir>0?1:dir<0?-1:0)*T.MathUtils.degToRad(deg);
    if(t.beam==="down"){
      var above=Math.max(0.6,Math.min(1.5,0.95+(sidIn-40)*(0.55/32))); // continuous SID -> tube height (40in=0.95m, 72in=1.5m)
      // supine long-axis (head) = +X; rotate the down-beam about world Z so +angS points cephalad (+X)
      beamDir=new T.Vector3(0,-1,0).applyAxisAngle(new T.Vector3(0,0,1),angS);
      from=to.clone().addScaledVector(beamDir,-above);
      var colLen=Math.max(0.2,2.5-from.y-0.1);
      tube.quaternion.identity(); tube.position.set(from.x,0,from.z);
      column.scale.y=colLen; column.position.set(0,from.y+colLen/2+0.1,0);
      carriage.position.set(0,2.5,0); head.position.set(0,from.y,0);
      head.quaternion.copy(new T.Quaternion().setFromUnitVectors(DOWN,beamDir.clone().normalize()));
      obj.buckyTray.position.set(to.x,0.7,0);
    } else if(t.beam==="inZ"){
      var dist=Math.max(0.7,Math.min(1.65,1.0+(sidIn-40)*(0.65/32))); // continuous SID -> tube distance (40in=1.0m, 72in=1.65m)
      // beam travels INTO the wall (-Z); tube sits in FRONT of the patient (+Z). +angS = cephalad (+Y)
      beamDir=new T.Vector3(0,0,-1).applyAxisAngle(new T.Vector3(1,0,0),angS);
      from=to.clone().addScaledVector(beamDir,-dist);
      tube.quaternion.identity(); tube.position.set(from.x,from.y,from.z);
      column.scale.y=0.5; column.position.set(0,0.55,0); carriage.position.set(0,0.9,0);
      head.position.set(0,0,0); head.quaternion.copy(new T.Quaternion().setFromUnitVectors(DOWN,beamDir.clone().normalize()));
      obj.wallBucky.position.set(to.x,to.y,-2.05); obj.wbFrame.position.set(to.x,to.y,-2.12);
    } else if(t.beam==="crossX"){ // horizontal beam across the tabletop (cross-table lateral of a limb resting on the table)
      var dx3=Math.max(0.65,Math.min(1.4,0.9+(sidIn-40)*(0.5/32)));
      beamDir=new T.Vector3(side==="right"?-1:1,0,0);
      from=to.clone().addScaledVector(beamDir,-dx3);
      tube.quaternion.identity(); tube.position.set(from.x,from.y,from.z);
      column.scale.y=0.4; column.position.set(0,0.5,0); carriage.position.set(0,0.9,0);
      head.position.set(0,0,0); head.quaternion.copy(new T.Quaternion().setFromUnitVectors(DOWN,beamDir.clone().normalize()));
    } else { // crossZ: horizontal mediolateral beam. IR on the affected/named side (patient-left => +Z); tube on the OPPOSITE side
      var dist2=Math.max(0.65,Math.min(1.4,0.9+(sidIn-40)*(0.5/32))); // continuous SID -> tube distance (cross-table)
      beamDir=new T.Vector3(0,0, side==="right"?-1:1);
      from=to.clone().addScaledVector(beamDir,-dist2);
      tube.quaternion.identity(); tube.position.set(from.x,from.y,from.z);
      column.scale.y=0.4; column.position.set(0,0.5,0); carriage.position.set(0,0.9,0);
      head.position.set(0,0,0); head.quaternion.copy(new T.Quaternion().setFromUnitVectors(DOWN,beamDir.clone().normalize()));
    }
    if(spec.seated||/^SEATED_/.test(spec.name)) obj.stool.position.set(obj.rig.position.x,0,obj.rig.position.z);
    obj.crDot.position.copy(to);
    var fs=fieldSize(collimRegion), fw=fs[0], fl=fs[1];
    placeField(to,beamDir,fw,fl);
    var col=p.fb==="correct"?0x34d399:p.fb==="miss"?0xfb7185:0x6ee7b7;
    var op=(p.fb?0.34:(""+p.dim==="1"?0.2:0.12));
    aimBeam(from,to,Math.max(fw,fl)*0.6,col,op);
    obj.fieldMat.color.set(p.fb==="correct"?0xbbf7d0:p.fb==="miss"?0xfecdd3:0xfff6cc);
    var hide=(""+p.hidebeam==="1");
    obj.beam.visible=!hide; obj.crDot.visible=!hide; obj.field.visible=!hide; obj.fieldEdge.visible=!hide;
  }

  function resize(el){

/* ---- SID semicircle dial: inferior-half arc, 40 at the left edge, 60 at bottom-center, 72 at the right edge ---- */
/* ===== Shared semicircle-dial geometry (inferior-half arc). Used by both the SID dial (40-72 in)
   and the CR angle dial (-40..+40 deg). Both dials share one viewBox so their arcs line up visually. */
const DIAL_CX=192, DIAL_CY=25, DIAL_R=95, DIAL_VB="0 0 384 175";
function dialPoint(deg,cx,cy,r){ const rad=deg*Math.PI/180; return {x:cx+r*Math.cos(rad), y:cy-r*Math.sin(rad)}; } // y flipped: SVG's y-axis points down, so screen-bottom (270 deg) needs -sin
/** Full 180 degree arcs with an exactly-diametric chord are a known SVG numerical edge case some renderers fail to paint, so every dial arc is built from <=90 degree segments through the bottom (270 deg) point. */
function dialArcPath(cx,cy,r,deg1,deg2){ const p1=dialPoint(deg1,cx,cy,r), p2=dialPoint(deg2,cx,cy,r); let d=`M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)}`; if(deg1<270&&deg2>270){ const mid=dialPoint(270,cx,cy,r); d+=` A ${r} ${r} 0 0 0 ${mid.x.toFixed(1)} ${mid.y.toFixed(1)} A ${r} ${r} 0 0 0 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`; } else { d+=` A ${r} ${r} 0 0 0 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`; } return d; }
function dialFullArcPath(cx,cy,r){ return dialArcPath(cx,cy,r,180,360); }

// SID dial: 40-72 in, 40=left edge, 60=bottom-center, 72=right edge
function sidAngleForValue(v){ v=Math.max(40,Math.min(72,parseFloat(v)||60)); return v<=60 ? 180+90*(v-40)/20 : 270+90*(v-60)/12; }
function sidValueForAngle(deg){ deg=Math.max(180,Math.min(360,deg)); return deg<=270 ? 40+20*(deg-180)/90 : 60+12*(deg-270)/90; }
// CR angle dial: -42 (caudal, left edge) .. 0 (perpendicular, bottom-center) .. +42 (cephalic, right edge)
function craAngleForValue(v){ v=Math.max(-42,Math.min(42,parseFloat(v)||0)); return 270+(v/42)*90; }
function craValueForAngle(deg){ deg=Math.max(180,Math.min(360,deg)); return (deg-270)/90*42; }

/** Generic pointer-drag binder for a semicircle dial. domain: {angleForValue,valueForAngle,min,max,snaps}. onLive/onCommit receive the rounded value. */
function bindDial(svgId,handleId,domain,onLive,onCommit){
  const svg=document.getElementById(svgId); if(!svg||state.showDetails)return;
  function toUser(e){ const m=svg.getScreenCTM(); if(!m)return null; const p=svg.createSVGPoint(); p.x=e.clientX; p.y=e.clientY; return p.matrixTransform(m.inverse()); }
  function valueFromPoint(p){
    let dx=p.x-DIAL_CX, dy=p.y-DIAL_CY;
    let deg=Math.atan2(-dy,dx)*180/Math.PI; if(deg<0)deg+=360;
    if(deg<180) deg=(dx<0)?180:360; // stray drag above the diameter (incl. exactly 0=360) clamps to the nearer edge
    let v=domain.valueForAngle(deg);
    for(const s of domain.snaps){ if(Math.abs(v-s)<=domain.snapTol)return s; }
    return Math.round(v);
  }
  function paint(v){
    const deg=domain.angleForValue(v), pt=dialPoint(deg,DIAL_CX,DIAL_CY,DIAL_R);
    const h=document.getElementById(handleId); if(h)h.setAttribute("transform",`translate(${pt.x.toFixed(1)} ${pt.y.toFixed(1)})`);
    onLive(v);
  }
  function apply(e,commit){ const p=toUser(e); if(!p)return; const v=valueFromPoint(p); paint(v); if(commit)onCommit(v); }
  let dragging=false;
  svg.onpointerdown=function(e){ dragging=true; try{svg.setPointerCapture(e.pointerId);}catch(_){} apply(e,false); if(e.cancelable)e.preventDefault(); };
  svg.onpointermove=function(e){ if(!dragging)return; apply(e,false); if(e.cancelable)e.preventDefault(); };
  svg.onpointerup=svg.onpointercancel=function(e){ if(!dragging)return; dragging=false; try{svg.releasePointerCapture(e.pointerId);}catch(_){} apply(e,true); };
}

function radiographMirror(exam){ if(!exam||!exam._lat)return false; const nat=RADIOGRAPH_NATIVE_SIDE[exam.region+"|"+exam.view]; return !!nat&&nat!==exam._lat; }
function radiographMirrorStyle(exam){ return radiographMirror(exam)?"transform:scaleX(-1);":""; }
/* Native anatomical side of each CR-drag PATIENT PHOTO (read from the photo). When a
   laterality-specific projection is stamped the opposite side, the photo is mirrored AND the
   grading target x is reflected by the same axis (renderCrAtlasCard + crCorrectPos), so the
   crosshair still grades correctly. Only listed here when the photo visibly shows a side. */
const CR_PHOTO_NATIVE_SIDE={

  "Hand|PA":"right","Hand|Oblique":"right",
  "Ankle|AP":"right","Ankle|Mortise":"right","Ankle|Medial Oblique":"right"

};
function crPhotoMirror(exam){ if(!exam||!exam._lat)return false; const nat=CR_PHOTO_NATIVE_SIDE[normalizeValue(exam.region)+"|"+normalizeValue(exam.view)]; return !!nat&&nat!==exam._lat; }
/* Laterality wording: paired parts read "Right Hand"; midline skull structures read
   "Cranium - Right side" / "Lateral (Right side)" since there is only one cranium. */
function sideOf(exam){ return (exam&&exam._lat)?(exam._lat==="left"?"Left":"Right"):""; }
function regionWithSide(exam){ const r=normalizeValue(exam&&exam.region); if(!exam||!exam._lat)return r; const side=sideOf(exam); return HEAD_LAT_REGIONS.has(exam.region)?(r+" - "+side+" side"):(side+" "+r); }
function sideSuffix(exam){ if(!exam||!exam._lat)return ""; const side=sideOf(exam); return HEAD_LAT_REGIONS.has(exam.region)?(" ("+side+" side)"):(" ("+side+")"); }
function renderRadiographModal(){ const exam=active(); const rg=radiographFor(exam); if(!rg){ state.modal=null; return ""; } return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-card" style="max-width:560px"><div class="modal-head"><h2>✓ Clear Image</h2><button class="btn" onclick="closeModal()">✕</button></div><p style="font-size:12px;color:var(--muted);margin:0 0 8px">${esc(exam.exam)} - ${esc(exam.view)}${sideSuffix(exam)}</p><img src="${rg.src}" alt="${esc(exam.view)} reference radiograph" style="width:100%;max-height:62vh;object-fit:contain;border-radius:12px;background:#000;${radiographMirrorStyle(exam)}"><p style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5">Image: <a href="${rg.page}" target="_blank" rel="noopener" style="color:#67e8f9">${esc(rg.title)}</a>${rg.artist?` by ${esc(rg.artist)}`:""} - <a href="${rg.licUrl||rg.page}" target="_blank" rel="noopener" style="color:#67e8f9">${esc(rg.license)}</a>, via Wikimedia Commons</p><div class="modal-actions"><button class="btn primary" onclick="closeModal()">Continue</button></div></div></div>`; }
/* Simulated exposure faults - even on a non-clear image, show the real radiograph filtered to
   demonstrate the specific error: mAs >25% low = underexposed (pale), mAs >50% high = extremely
   overexposed (near-black), large focal spot where small is required = blurred (density model). */
function masValue(v){ const raw=normalizeValue(v); if(!raw)return null; if(raw.includes("@")){ const p=raw.split("@"); const n=parseFloat(p[0])*parseFloat(p[1]); return isFinite(n)?n:null; } const n=parseFloat(raw); return isFinite(n)?n:null; }
function currentMasPair(exam,answers){ const bt=breathingTech(exam); if(bt){ const cm=parseFloat(bt.ma)*parseFloat(bt.sec); const sm=(parseFloat(answers.ma)||0)*(parseFloat(answers.sec)||0); return {correct:isFinite(cm)?cm:null,student:sm||null}; } return {correct:masValue(exam.mas),student:masValue(answers.mas)}; }
function exposureDemo(exam,answers){ if(!exam||!answers)return null; const filters=[]; const notes=[];
  // Density index: negative = too light (underexposed), positive = too dark (overexposed).
  let density=0;
  const {correct,student}=currentMasPair(exam,answers);
  if(correct&&student!=null){ const ratio=student/correct;
    if(ratio<0.75){ density-=1; notes.push("Your mAs was more than 25% too low, so too little exposure reaches the receptor and the image comes out pale and washed-out. Increase mAs."); }
    else if(ratio>1.5){ density+=2; notes.push("Your mAs was more than 50% too high, so far too much exposure reaches the receptor and the image is badly overexposed. Reduce mAs."); }
  }
  // SID (inverse-square law): a shorter SID than required raises receptor exposure (darker); a longer SID lowers it (lighter).
  const cSid=parseInt(normalizeAnswer("sid",exam.sid),10), sSid=parseInt(normalizeAnswer("sid",answers.sid),10);

    if(sSid<cSid){ density+=1; notes.push("You used a "+sSid+" inch SID where "+cSid+" inches is required. A shorter SID increases beam intensity at the receptor (inverse-square law), overexposing the image."); }
    else { density-=1; notes.push("You used a "+sSid+" inch SID where "+cSid+" inches is required. A longer SID reduces beam intensity at the receptor (inverse-square law), underexposing the image."); }

   non-trauma routine in the same body region (e.g. clear Humerus Routine -> unlock Trauma Humerus). */
function isTraumaRoutine(name){ return /^Trauma\s/i.test(normalizeValue(name)); }

function routineViews(name){ return orderedViewsForRoutine(name).filter(v=>!v._customId); }
/** every projection of a routine has been scored 100% at least once */
function routineCleared(name,db){ db=db||progDb(); const vs=routineViews(name); if(!vs.length)return false; return vs.every(v=>((db[rvKey(v)]||{}).perfects||0)>=1); }
function prereqRoutinesFor(traumaName){ const reg=routineRegionName(traumaName); if(!reg)return []; return [...new Set(EXAMS.filter(e=>e.region===reg&&!isTraumaRoutine(e.exam)).map(e=>e.exam))]; }

function celebrateRoutine(name,unlocked){ try{ fxPlay("milestone"); }catch(e){} const colors=["#fbbf24","#f59e0b","#22d3ee","#34d399","#a78bfa","#fb7185","#f472b6"]; let conf=""; for(let i=0;i<48;i++){ const c=colors[i%colors.length]; const l=(Math.random()*100).toFixed(2); const dl=(Math.random()*0.6).toFixed(2); const du=(2.6+Math.random()*2).toFixed(2); const rot=Math.floor(Math.random()*360); const w=6+Math.floor(Math.random()*7); conf+=`<i style="left:${l}%;background:${c};width:${w}px;height:${(w*0.55).toFixed(1)}px;animation-delay:${dl}s;animation-duration:${du}s;transform:rotate(${rot}deg)"></i>`; } const unlockHtml=(unlocked&&unlocked.length)?`<div class="celeb-unlock"><span class="celeb-lock">🔓</span><span>New trauma routine unlocked<br><b>${unlocked.map(esc).join(" & ")}</b></span></div>`:""; const medal=`<svg class="celeb-medal" viewBox="0 0 120 120"><defs><radialGradient id="celebG" cx="0.5" cy="0.38" r="0.7"><stop offset="0" stop-color="#fff7db"/><stop offset="0.5" stop-color="#fbbf24"/><stop offset="1" stop-color="#b45309"/></radialGradient></defs><circle cx="60" cy="60" r="50" fill="url(#celebG)" stroke="#fff8e1" stroke-width="3"/><circle cx="60" cy="60" r="42" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="1.4" stroke-dasharray="2 5"/><path d="M60 28 l8 16.5 18.2 2.6 -13.1 12.8 3.1 18.1 -16.2-8.5 -16.2 8.5 3.1-18.1 -13.1-12.8 18.2-2.6 Z" fill="#fffdf5" stroke="#f59e0b" stroke-width="1"/></svg>`; const el=document.createElement("div"); el.className="celebrate-overlay"; el.onclick=dismissCelebrate; el.innerHTML=`<div class="celeb-rays"></div><div class="celeb-confetti">${conf}</div><div class="celeb-core">${medal}<div class="celeb-title">ROUTINE MASTERED</div><div class="celeb-sub">${esc(name)}</div><div class="celeb-note">Every projection cleared at 100%</div>${unlockHtml}<div class="celeb-tap">tap to continue</div></div>`; document.body.appendChild(el); if(_celebTimer)clearTimeout(_celebTimer); _celebTimer=setTimeout(dismissCelebrate,6500) /* --- Feature 1: Hard Mode tolerance --- */
/** Return true when entered is within +/- pct (default 25%) of correct. */
const FIELD_TOL={kvp:0.15,mas:0.25};
/** Per-field tolerance; small mAs values (<=10) get a wider 50% band. */
function tolFor(field,correct){ if(field==="mas"){ const c=parseFloat(correct); if(isFinite(c)&&c<=10)return 0.5; } return FIELD_TOL[field]||0.25; }
function isWithinTolerance(entered,correct,pct){ if(pct==null)pct=0.25; const e=parseFloat(entered),c=parseFloat(correct); if(!isFinite(e)||!isFinite(c))return false; return e>=c*(1-pct)&&e<=c*(1+pct); }
function toggleHardMode(){ state.hardMode=!state.hardMode; state.choices={}; saveHardPref(); render(); }
/** Parse a breathing-technique mas value of the form "mA@seconds" (e.g. "10@3"). */
function breathingTech(exam){ const raw=normalizeValue(exam&&exam.mas); if(!raw.includes("@"))return null; const parts=raw.split("@"); return {ma:parts[0].trim(),sec:parts[1].trim()}; }
const MA_POOL=["2.5","5","10","15","20","25"], SEC_POOL=["0.5","1","2","3","4"];
/** Render a separately-graded mA or seconds card for orthostatic (breathing technique) projections. */
function renderTechCard(field,correct,pool,result){ const label=FIELD_LABELS[field], pts=FIELD_POINTS[field]; if(state.hardMode){ const val=normalizeValue(state.answers[field]); const rev=(state.showDetails&&result)?(result.ok?`<div class="hint" style="border-color:rgba(110,231,183,.45);background:rgba(16,185,129,.18);color:#d1fae5">✓ ${esc(val||"blank")} accepted (target ${esc(displayValue(field,correct))})</div>`:`<div class="hint">Your ${label} (${esc(val||"blank")}) is outside the acceptable range. Correct: ${esc(displayValue(field,correct))}</div>`):""; return `<div class="choice-card"><div class="choice-head"><span>${label} <small style="color:var(--muted);font-weight:700">manual entry</small></span><span class="badge">${pts} pts</span></div><div class="hardin"><input type="number" step="0.1" inputmode="decimal" value="${esc(val)}" ${state.showDetails?"disabled":""} aria-label="${label} value" oninput="setHard('${field}',this.value)" placeholder="Enter ${label}"></div>${rev}</div>`; } if(!state.choices[field]){ const ck=normalizeAnswer(field,correct); const decoys=shuffle(pool.filter(v=>normalizeAnswer(field,v)!==ck)).slice(0,3); state.choices[field]=shuffle([normalizeValue(correct),...decoys]); } const choices=state.choices[field]; return `<div class="choice-card"><div class="choice-head"><span>${label}</span><span class="badge">${pts} pts</span></div><div class="tiles">${choices.map(choice=>{ const selected=isCorrectAnswer(field,state.answers[field],choice); const correctChoice=isCorrectAnswer(field,choice,correct); const selOk=state.showDetails&&selected&&correctChoice; const selBad=state.showDetails&&selected&&!correctChoice; const corUn=state.showDetails&&!selected&&correctChoice; const cls=selOk?"ok":selBad?"bad":corUn?"ok":selected?"selected":""; const tag=selOk?"✓ selected":selBad?"× your pick":corUn?"correct":""; return `<button class="tile ${cls}" ${state.showDetails?"disabled":""} onclick='pick(${JSON.stringify(field)}, ${JSON.stringify(choice)})'><span>${esc(displayValue(field,choice))}</span>${tag?`<small>${tag}</small>`:""}</button>`; }).join("")}</div>${state.showDetails&&result&&!result.ok?`<div class="hint">Your answer: ${esc(result.selected||"blank")}<br>Correct: ${esc(displayValue(field,correct))}</div>`:""}</div>`; }
/** Store the typed value without a full re-render (keeps input focus). No hints while answering. */

function ddChip(l,zones,combo){ const key="line_"+l.id; const val=normalizeValue(state.answers[key]); const show=state.showDetails; let cls="dd-chip",tag=""; if(show){ if(combo&&combo.pickOne){ const placed=val!==""; const isPerp=normalizeText(val)===normalizeText(l.correct); const soloOk=combo.perpIds.length===1&&combo.misplacedCount===0; if(placed&&isPerp&&combo.perpIds.length===1){ cls+=" ok"; tag=`<small>✓ ${esc(l.id)} perpendicular</small>`; } else if(placed&&isPerp){ cls+=" bad"; tag=`<small>✗ use only ONE line</small>`; } else if(placed){ cls+=" bad"; tag=`<small>✗ perpendicular to IR, or back to tray</small>`; } else if(soloOk){ tag=`<small>not used - OK</small>`; } else { cls+=" bad"; tag=`<small>✗ place one line perpendicular</small>`; } } else { const ok=normalizeText(val)===normalizeText(l.correct); cls+=ok?" ok":" bad"; tag=`<small>${ok?"✓ correct":"✗ → "+esc(l.correct)}</small>`; } } return `<div class="${cls}" draggable="false" onpointerdown="ddPointerDown(event,'${l.id}')" ontouchstart="ddTouchStart(event,'${l.id}')"><span class="dd-chip-label">${esc(l.label)}</span>${tag}</div>`; }

/* --- Features 3 & 4: Markers & Shields --- */
/** Required anatomical marker for an exam (null when not applicable). */
function getMarkerRequirement(exam){ if(!exam)return null; if(exam._lat){ if(isUnilateralExam(exam)||/lateral|rhese/i.test(normalizeValue(exam.view)))return {type:"directional",required:[exam._lat]}; } const region=exam.region; if(region==="SI Joints")return {type:"orientation",required:["side up"]}; if(region==="Ribs"){ const enm=normalizeValue(exam.exam||""); const vw=normalizeValue(exam.view).toLowerCase(); if(/^Unilateral Ribs Routine/.test(enm))return {type:"directional",required:[/\(right,/.test(enm)?"right":"left"]}; if(/rpo|lao/.test(vw))return {type:"directional",required:["right"]}; if(/lpo|rao/.test(vw))return {type:"directional",required:["left"]}; return {type:"directional",required:["left","right"]}; } if(/^Acetabulum/.test(exam.exam||""))return {type:"directional",required:["right"]}; if(/^Trauma C-Spine/.test(exam.exam||""))return {type:"directional",required:["left"]}; if(region==="Orbits"&&/^Lateral$/i.test(normalizeValue(exam.view)))return {type:"directional",required:["left","right"]}; const ptText=normalizeText(exam.pt||""); if(ptText.includes("left lateral")||ptText.includes("left side"))return {type:"directional",required:["left"]}; if(ptText.includes("right lateral")||ptText.includes("right side"))return {type:"directional",required:["right"]}; if(/lateral|rhese/i.test(normalizeValue(exam.view)))return {type:"directional",required:["left"]}; return {type:"directional",required:["left","right"]}; }
/** Extremity exams get a randomly assigned laterality, consistent within a routine. */
function isExtremityExam(exam){ const g=POSITION_GROUPS[exam?.region]; return g==="upperExt"||g==="lowerExt"||exam?.region==="Femur"; }
/** Unilateral studies get a laterality + matching marker. Includes the hip (but NOT the bilateral AP pelvis survey). */
function isUnilateralExam(exam){ if(isExtremityExam(exam))return true; if(exam?.region==="Hip"&&!/pelvis/i.test(normalizeValue(exam?.view||"")))return true; return false; }
function randLat(){ return Math.random()<0.5?"left":"right"; }
const HEAD_LAT_REGIONS=new Set(["Cranium","Facial Bones","Sinuses"]); // Orbits/Mandible now bake a fixed side into the view name (Rhese/Oblique Right|Left) instead of random per-instance stamping
function stampLat(exam,side){ return (isUnilateralExam(exam)||HEAD_LAT_REGIONS.has(exam?.region))?{...exam,_lat:side}:exam; }

/* ---- Progress backup: all app localStorage packed into a copyable code, so a student can move
       devices or recover after clearing app data. In-app only; nothing leaves the device. ---- */
const BACKUP_KEYS=[LS_HARD,LS_SOUND,LS_EXAMS,LS_ROUTINES,LS_SIMS,LS_OVERRIDES,LS_PROG,"pp_streak_v1","crSpotFixes"];
function exportProgress(){ const data={_v:1,_ts:Date.now()}; BACKUP_KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v!=null)data[k]=v; }); try{ return btoa(unescape(encodeURIComponent(JSON.stringify(data)))); }catch(e){ return ""; } }
function importProgress(code){ try{ const obj=JSON.parse(decodeURIComponent(escape(atob(String(code).trim())))); if(!obj||typeof obj!=="object"||obj._v!==1)return false; Object.keys(obj).forEach(k=>{ if(k[0]==="_")return; if(BACKUP_KEYS.indexOf(k)>=0)localStorage.setItem(k,obj[k]); }); return true; }catch(e){ return false; } }
function openBackup(){ state.modal="backup"; render(); }
function copyBackup(){ const code=exportProgress(); const done=()=>flash("Backup code copied - paste it somewhere safe"); try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(code).then(done,()=>fallbackCopy(code,done)); } else fallbackCopy(code,done); }catch(e){ fallbackCopy(code,done); } }
function fallbackCopy(code,done){ const ta=document.getElementById("backup-out"); if(ta){ ta.focus(); ta.select(); try{ document.execCommand("copy"); done(); }catch(e){ flash("Select the code and copy manually"); } } }
function restoreBackup(){ const ta=document.getElementById("backup-in"); const code=ta?ta.value:""; if(!code.trim()){ flash("Paste a backup code first"); return; }
  if(code.trim().toLowerCase()==="reset"){ if(typeof confirm==="function"&&!confirm("Delete ALL saved data on this device? This erases your Skill Map progress, due-for-review, custom routines and SIMs, best streak, and settings. This cannot be undone."))return; try{ [LS_HARD,LS_SOUND,LS_EXAMS,LS_ROUTINES,LS_SIMS,LS_OVERRIDES,LS_PROG,LS_NEWUNLOCK,"pp_streak_v1","crSpotFixes"].forEach(k=>localStorage.removeItem(k)); }catch(e){} flash("All data deleted. Reloading a fresh start."); setTimeout(()=>{ try{ location.reload(); }catch(e){ hydrate(); render(); } },700); return; }
