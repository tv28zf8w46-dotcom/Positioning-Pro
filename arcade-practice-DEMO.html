<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Positioning Pro — Trauma Shift (Roadmap #13 + #16 + #17)</title>
<style>
  :root{--bg:#0b1120;--panel:#131c2e;--line:#22304a;--ink:#e6edf7;--mut:#8fa3c0;--cy:#38bdf8;--ok:#34d399;--bad:#fb7185;--amber:#fbbf24;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
       display:flex;flex-direction:column;align-items:center;padding:22px;position:relative;overflow-x:hidden}
  #glow{position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 0 rgba(251,191,36,0);transition:box-shadow .25s;z-index:5}
  h1{font-size:17px;margin:0 0 2px} .sub{color:var(--mut);font-size:12px;margin-bottom:16px}
  .top{display:flex;gap:14px;width:min(760px,96vw);margin-bottom:14px}
  .stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:center}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut)}
  .stat .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
  .combo .v{color:var(--amber)} .timer .v{color:var(--cy)}
  .stage{width:min(760px,96vw);display:grid;grid-template-columns:1fr;gap:14px}
  .reqhost{display:flex;justify-content:center}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  button{background:#0e1626;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600}
  button:hover{border-color:var(--cy)}
  .good{border-color:var(--ok);color:var(--ok)} .bad{border-color:var(--bad);color:var(--bad)}
  .start{background:var(--cy);color:#04121f;border:none}
  .popup{position:fixed;left:50%;top:38%;transform:translateX(-50%);font-size:34px;font-weight:900;pointer-events:none;z-index:20;
    text-shadow:0 2px 20px rgba(0,0,0,.6);animation:pop 1s ease-out forwards}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,10px) scale(.8)}20%{opacity:1;transform:translate(-50%,-4px) scale(1.1)}100%{opacity:0;transform:translate(-50%,-60px) scale(1)}}
  .tierlabel{position:fixed;top:70px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);z-index:20;opacity:0;transition:opacity .2s}
  .foot{color:var(--mut);font-size:12px;margin-top:14px;text-align:center}
  .end{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;text-align:center;width:min(760px,96vw)}
</style>
</head>
<body>
  <div id="glow"></div>
  <div class="tierlabel" id="tier"></div>
  <h1>Trauma Shift</h1>
  <p class="sub">Orders arrive on the clock. Read the requisition, then position (mock). Chain correct answers for combo multipliers.</p>

  <div class="top">
    <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
    <div class="stat combo"><div class="k">Combo</div><div class="v" id="combo">×1</div></div>
    <div class="stat"><div class="k">Streak / Best</div><div class="v" id="streak">0</div></div>
    <div class="stat timer"><div class="k">Time</div><div class="v" id="time">60</div></div>
  </div>

  <div class="stage">
    <div class="reqhost" id="reqhost"></div>
    <div class="actions" id="actions">
      <button class="start" onclick="startShift()">Start 60-second shift</button>
    </div>
  </div>
  <div class="foot" id="foot">Powered by requisition.js + streak-combo.js — the same engines that plug into the live app.</div>

<script>
/* ============================================================================
 * Positioning Pro — Requisition & Patient Variety Generator  (Roadmap #13)
 * ----------------------------------------------------------------------------
 * Generates realistic "incoming order" requisitions to wrap each practice exam:
 * patient demographics, MRN/accession, clinical history/indication tied to the
 * body part, priority (routine / STAT / trauma), body habitus, and ordering
 * provider. Deterministic via a seedable PRNG so tests & replays reproduce.
 *
 *   const req = Requisition.generate({ region:'Wrist', view:'PA', seed: 42 });
 *   req.patient // {name, age, sex, dob, mrn, habitus}
 *   req.order   // {accession, priority, exam, indication, provider, history}
 *   Requisition.card(req) // -> printable HTML requisition slip
 * ==========================================================================*/
(function (global) {
  'use strict';

  // ---- seedable PRNG (mulberry32) ----
  function rng(seed) {
    let a = (seed >>> 0) || 0x9e3779b9;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const pick = (r, arr) => arr[Math.floor(r() * arr.length)];
  const int = (r, lo, hi) => lo + Math.floor(r() * (hi - lo + 1));

  const FIRST_M = ['James', 'Robert', 'Michael', 'David', 'Marcus', 'Andre', 'Luis', 'Kevin', 'Omar', 'Ethan', 'Noah', 'Frank', 'Raymond', 'Curtis'];
  const FIRST_F = ['Mary', 'Linda', 'Patricia', 'Angela', 'Denise', 'Rosa', 'Aisha', 'Grace', 'Chloe', 'Nadia', 'Helen', 'Brenda', 'Tanya', 'Yuki'];
  const LAST = ['Nguyen', 'Walker', 'Johnson', 'Reyes', 'Okafor', 'Patel', 'Sullivan', 'Cruz', 'Bauer', 'Ivanov', 'Kim', 'Delgado', 'Fischer', 'Abbott', 'Mensah'];
  const PROVIDERS = ['Dr. Patel (ED)', 'Dr. Osei (Ortho)', 'Dr. Lund (Urgent Care)', 'Dr. Romano (Ortho)', 'Dr. Fischer (ED)', 'NP Grant (Sports Med)'];
  const HABITUS = [['sthenic', 'average build'], ['asthenic', 'slender — reduce technique'], ['hypersthenic', 'large habitus — increase technique'], ['pediatric', 'pediatric — minimize dose']];

  // clinical indications keyed by region; %chance trauma vs chronic
  const INDICATIONS = {
    Hand: ['crush injury to hand at work', 'fall onto outstretched hand, pain over MCPs', 'suspected boxer’s fracture', 'chronic RA follow-up', 'foreign body, glass', 'jammed finger, swelling'],
    Wrist: ['FOOSH, snuffbox tenderness (r/o scaphoid #)', 'wrist pain after fall', 'suspected distal radius fracture', 'chronic wrist pain, r/o ganglion', 'sports injury, dorsal wrist pain'],
    Elbow: ['fell off bike, unable to extend elbow', 'r/o radial head fracture', 'olecranon pain after fall', 'lateral epicondyle tenderness', 'MVC, arm pain', 'effusion on exam'],
    Forearm: ['direct blow to forearm, deformity', 'r/o both-bone fracture', 'nightstick injury to ulna', 'fall, mid-forearm pain and swelling'],
    Foot: ['stepped on nail, r/o foreign body', 'twisted foot, midfoot pain (r/o Lisfranc)', 'r/o 5th metatarsal fracture', 'dropped weight on foot', 'chronic forefoot pain', 'crush injury'],
    _default: ['pain and swelling after injury', 'r/o fracture', 'trauma, evaluate for injury'],
  };
  const PRIORITIES = [['Routine', 0.55], ['STAT', 0.28], ['Trauma', 0.17]];

  function weighted(r, table) {
    let x = r(), acc = 0;
    for (const [val, w] of table) { acc += w; if (x <= acc) return val; }
    return table[table.length - 1][0];
  }

  function pad(n, w) { n = String(n); while (n.length < w) n = '0' + n; return n; }

  function generate(o) {
    o = o || {};
    const seed = (o.seed != null) ? o.seed : (Date.now() ^ Math.floor(Math.random() * 1e9));
    const r = rng(seed);
    const region = o.region || 'Hand';
    const view = o.view || '';
    const sex = pick(r, ['M', 'F']);
    const first = pick(r, sex === 'M' ? FIRST_M : FIRST_F);
    const last = pick(r, LAST);
    const hab = pick(r, HABITUS);
    // age: pediatric habitus -> young
    const age = hab[0] === 'pediatric' ? int(r, 4, 16) : int(r, 17, 89);
    const year = 2026 - age;
    const dob = pad(int(r, 1, 12), 2) + '/' + pad(int(r, 1, 28), 2) + '/' + year;
    const mrn = pad(int(r, 100000, 999999), 6);
    const accession = 'XR-' + (2026) + '-' + pad(int(r, 1, 99999), 5);
    const indication = pick(r, INDICATIONS[region] || INDICATIONS._default);
    const priority = weighted(r, PRIORITIES);
    const provider = pick(r, PROVIDERS);

    return {
      seed,
      patient: { name: last + ', ' + first, first, last, age, sex, dob, mrn, habitus: hab[0], habitusNote: hab[1] },
      order: {
        accession, priority, region, view,
        exam: region + (view ? ' — ' + view : ''),
        indication, provider,
        history: age + ' y/o ' + (sex === 'M' ? 'male' : 'female') + ', ' + indication + '.',
      },
    };
  }

  function esc(s) { return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

  /** Printable requisition slip HTML. */
  function card(req) {
    const p = req.patient, o = req.order;
    const pc = { 'Routine': '#38bdf8', 'STAT': '#fbbf24', 'Trauma': '#fb7185' }[o.priority] || '#8fa3c0';
    return '<div class="req-card">' +
      '<div class="req-head"><span class="req-hosp">LANIER GENERAL · Radiology</span>' +
      '<span class="req-pri" style="background:' + pc + '22;color:' + pc + ';border:1px solid ' + pc + '">' + esc(o.priority) + '</span></div>' +
      '<div class="req-exam">' + esc(o.exam) + '</div>' +
      '<div class="req-grid">' +
      '<div><label>Patient</label>' + esc(p.name) + '</div>' +
      '<div><label>MRN</label>' + esc(p.mrn) + '</div>' +
      '<div><label>DOB / Age</label>' + esc(p.dob) + ' (' + p.age + ')</div>' +
      '<div><label>Sex</label>' + esc(p.sex) + '</div>' +
      '<div><label>Accession</label>' + esc(o.accession) + '</div>' +
      '<div><label>Habitus</label>' + esc(p.habitus) + '</div>' +
      '</div>' +
      '<div class="req-hist"><label>Clinical history</label>' + esc(o.history) + '</div>' +
      '<div class="req-foot"><span>Ordered by ' + esc(o.provider) + '</span><span>' + esc(p.habitusNote) + '</span></div>' +
      '</div>';
  }

  // default stylesheet callers can inject once
  const CSS = '.req-card{font:13px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;background:#fbfaf5;color:#1a2230;border-radius:10px;padding:14px 16px;border:1px solid #d8d2bf;max-width:420px;box-shadow:0 8px 24px rgba(0,0,0,.25)}' +
    '.req-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed #c7bfa6;padding-bottom:8px}' +
    '.req-hosp{font-weight:700;letter-spacing:.04em;font-size:11px;color:#5b6472}' +
    '.req-pri{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.06em}' +
    '.req-exam{font-size:18px;font-weight:700;margin:10px 0 8px}' +
    '.req-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}' +
    '.req-grid label,.req-hist label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#8a8674}' +
    '.req-hist{margin-top:10px;background:#f1ecda;border-radius:8px;padding:8px 10px}' +
    '.req-foot{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:#6b7280}';

  function generateBatch(list, seedBase) {
    return list.map((e, i) => generate({ region: e.region, view: e.view, seed: (seedBase || 1) * 1000 + i }));
  }

  function selfTest() {
    const fails = [];
    const a = generate({ region: 'Wrist', view: 'PA', seed: 7 });
    const b = generate({ region: 'Wrist', view: 'PA', seed: 7 });
    if (JSON.stringify(a) !== JSON.stringify(b)) fails.push('same seed must be deterministic');
    const c = generate({ region: 'Wrist', view: 'PA', seed: 8 });
    if (JSON.stringify(a) === JSON.stringify(c)) fails.push('different seed should differ');
    if (a.order.region !== 'Wrist') fails.push('region should carry through');
    if (!/scaphoid|wrist|fracture|radius|FOOSH|pain|ganglion/i.test(a.order.indication)) fails.push('wrist indication should be plausible: ' + a.order.indication);
    if (!(a.patient.age >= 4 && a.patient.age <= 89)) fails.push('age out of range: ' + a.patient.age);
    if (!/^XR-2026-\d{5}$/.test(a.order.accession)) fails.push('accession format wrong: ' + a.order.accession);
    const html = card(a);
    if (!/req-card/.test(html) || !/Wrist/.test(html)) fails.push('card html malformed');
    // pediatric habitus implies young age
    let foundPed = false;
    for (let s = 0; s < 60 && !foundPed; s++) { const g = generate({ region: 'Hand', seed: s }); if (g.patient.habitus === 'pediatric') { foundPed = true; if (g.patient.age > 16) fails.push('pediatric habitus should be <=16, got ' + g.patient.age); } }
    return { pass: fails.length === 0, failures: fails };
  }

  const API = { generate, generateBatch, card, CSS, selfTest };
  if (typeof module !== 'undefined' && module.exports) module.exports = API;
  global.Requisition = API;
})(typeof window !== 'undefined' ? window : globalThis);

</script>
<script>
/* ============================================================================
 * Positioning Pro — Streak & Combo Scoring Engine  (Design Roadmap #16)
 * ----------------------------------------------------------------------------
 * Turns a stream of graded attempts into arcade-style scoring: consecutive
 * correct answers build a streak, the streak drives a combo multiplier, and
 * each answer yields points (accuracy- and speed-weighted) plus UI signals
 * (edge-glow level, score popup text, milestone flags).
 *
 * Pure + injectable storage/clock -> unit-testable, no DOM required.
 *   const eng = StreakEngine({ storage: localStorage });
 *   const ev = eng.answer(true, { accuracy: 92, speedMs: 3400 });
 *   // ev = { points, multiplier, streak, tier, glow, popup, milestone, total }
 * ==========================================================================*/
(function (global) {
  'use strict';

  const CONFIG = {
    basePoints: 100,
    // streak thresholds -> combo tiers [minStreak, multiplier, label, glow(0..4)]
    tiers: [
      [0, 1.0, '', 0],
      [3, 1.5, 'Nice', 1],
      [5, 2.0, 'Hot streak', 2],
      [8, 3.0, 'On fire', 3],
      [12, 4.0, 'Unstoppable', 4],
    ],
    speedBonusMax: 50,       // max bonus points for a fast answer
    speedFullMs: 2000,       // <= this = full speed bonus
    speedZeroMs: 12000,      // >= this = no speed bonus
    milestoneEvery: 5,       // celebrate every N-streak
  };

  function tierFor(streak, cfg) {
    let t = cfg.tiers[0];
    for (const cand of cfg.tiers) if (streak >= cand[0]) t = cand;
    return { multiplier: t[1], label: t[2], glow: t[3] };
  }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function StreakEngine(opts) {
    opts = opts || {};
    const cfg = Object.assign({}, CONFIG, opts.config || {});
    const storage = opts.storage || null;
    const KEY = opts.storageKey || 'pp_streak_v1';

    let streak = 0, total = 0, best = loadBest(), maxComboThisRun = 1, answered = 0, correctCount = 0;

    function loadBest() { try { return storage ? (parseInt(storage.getItem(KEY), 10) || 0) : 0; } catch (e) { return 0; } }
    function saveBest() { try { if (storage) storage.setItem(KEY, String(best)); } catch (e) {} }

    function speedBonus(ms) {
      if (ms == null) return 0;
      const f = clamp((cfg.speedZeroMs - ms) / (cfg.speedZeroMs - cfg.speedFullMs), 0, 1);
      return Math.round(cfg.speedBonusMax * f);
    }

    /** Register one graded attempt. correct:boolean, meta:{accuracy?0..100, speedMs?} */
    function answer(correct, meta) {
      meta = meta || {};
      answered += 1;
      if (correct) {
        streak += 1; correctCount += 1;
        const tier = tierFor(streak, cfg);
        const acc = meta.accuracy == null ? 100 : clamp(meta.accuracy, 0, 100);
        const bonus = speedBonus(meta.speedMs);
        const raw = (cfg.basePoints * (acc / 100) + bonus);
        const points = Math.round(raw * tier.multiplier);
        total += points;
        maxComboThisRun = Math.max(maxComboThisRun, tier.multiplier);
        if (streak > best) { best = streak; saveBest(); }
        const milestone = (streak % cfg.milestoneEvery === 0) ? streak : 0;
        return {
          correct: true, streak, points, multiplier: tier.multiplier,
          tier: tier.label, glow: tier.glow, total, best,
          popup: '+' + points + (tier.multiplier > 1 ? '  ×' + tier.multiplier : ''),
          milestone, newBest: streak === best && best > 0,
        };
      } else {
        const lostStreak = streak;
        streak = 0;
        return {
          correct: false, streak: 0, points: 0, multiplier: 1,
          tier: '', glow: 0, total, best,
          popup: lostStreak >= 3 ? 'Streak lost (' + lostStreak + ')' : 'Miss',
          milestone: 0, brokeStreak: lostStreak,
        };
      }
    }

    function state() {
      const tier = tierFor(streak, cfg);
      return { streak, total, best, multiplier: tier.multiplier, tier: tier.label, glow: tier.glow,
               answered, correctCount, accuracy: answered ? Math.round(100 * correctCount / answered) : 0,
               maxCombo: maxComboThisRun };
    }
    function resetRun() { streak = 0; total = 0; answered = 0; correctCount = 0; maxComboThisRun = 1; }
    function nextTierInfo() {
      // how many more correct to reach the next multiplier tier
      for (const cand of cfg.tiers) if (cand[0] > streak) return { at: cand[0], need: cand[0] - streak, multiplier: cand[1], label: cand[2] };
      return null;
    }

    return { answer, state, resetRun, nextTierInfo, config: cfg, get best() { return best; } };
  }

  function selfTest() {
    const fails = [];
    const mem = (() => { let v = null; return { getItem: () => v, setItem: (k, x) => v = x }; })();
    const e = StreakEngine({ storage: mem, config: { speedFullMs: 2000, speedZeroMs: 12000 } });

    let ev = e.answer(true, { accuracy: 100 });
    if (ev.multiplier !== 1) fails.push('streak 1 should be ×1');
    if (ev.points !== 100) fails.push('base points should be 100 at ×1 full accuracy, got ' + ev.points);

    e.answer(true, { accuracy: 100 }); ev = e.answer(true, { accuracy: 100 }); // streak 3
    if (ev.multiplier !== 1.5) fails.push('streak 3 should be ×1.5, got ' + ev.multiplier);

    for (let i = 0; i < 2; i++) ev = e.answer(true, { accuracy: 100 }); // streak 5
    if (ev.multiplier !== 2.0) fails.push('streak 5 should be ×2, got ' + ev.multiplier);
    if (ev.milestone !== 5) fails.push('streak 5 should flag milestone');

    // miss resets streak + reports broken streak
    ev = e.answer(false);
    if (ev.streak !== 0) fails.push('miss should reset streak');
    if (ev.brokeStreak !== 5) fails.push('miss should report broken streak length');

    // accuracy weighting: 50% accuracy at ×1 -> 50 pts
    const e2 = StreakEngine({ storage: mem });
    const a = e2.answer(true, { accuracy: 50 });
    if (a.points !== 50) fails.push('50% accuracy should yield 50 pts, got ' + a.points);

    // speed bonus: instant answer adds up to speedBonusMax
    const e3 = StreakEngine({ storage: mem });
    const fast = e3.answer(true, { accuracy: 100, speedMs: 1000 });
    if (fast.points <= 100) fails.push('fast answer should exceed base (speed bonus), got ' + fast.points);

    // best streak persists
    const store = (() => { let v = null; return { getItem: () => v, setItem: (k, x) => v = x }; })();
    const p1 = StreakEngine({ storage: store });
    for (let i = 0; i < 4; i++) p1.answer(true, { accuracy: 100 });
    const p2 = StreakEngine({ storage: store });
    if (p2.best < 4) fails.push('best streak should persist across instances, got ' + p2.best);

    // nextTierInfo
    const e4 = StreakEngine({ storage: mem });
    e4.answer(true, {});
    const nt = e4.nextTierInfo();
    if (!nt || nt.at !== 3) fails.push('nextTier after streak 1 should target 3');

    return { pass: fails.length === 0, failures: fails };
  }

  const API = { StreakEngine, tierFor, CONFIG, selfTest };
  if (typeof module !== 'undefined' && module.exports) module.exports = API;
  global.StreakEngine = StreakEngine;
  global.StreakComboAPI = API;
})(typeof window !== 'undefined' ? window : globalThis);

</script>
<script>
  const PROJ=[
    {region:'Hand',view:'PA'},{region:'Hand',view:'Oblique'},{region:'Hand',view:'Fan Lateral'},
    {region:'Wrist',view:'PA'},{region:'Wrist',view:'Oblique'},{region:'Wrist',view:'Lateral'},{region:'Wrist',view:'PA Ulnar Deviation'},
    {region:'Elbow',view:'AP'},{region:'Elbow',view:'Lateral'},{region:'Elbow',view:'Radial Coyle'},{region:'Elbow',view:'Partial Flexion'},
    {region:'Forearm',view:'AP'},{region:'Forearm',view:'Lateral'},{region:'Foot',view:'AP'},{region:'Foot',view:'Lateral'},
  ];
  // inject requisition styles
  const st=document.createElement('style'); st.textContent=Requisition.CSS; document.head.appendChild(st);
  const glowColors=['transparent','rgba(56,189,248,.25)','rgba(52,211,153,.3)','rgba(251,191,36,.4)','rgba(251,113,133,.5)'];

  let eng=null, timeLeft=60, timer=null, current=null, askedAt=0, seedN=1, running=false;

  function setGlow(level){ document.getElementById('glow').style.boxShadow='inset 0 0 120px '+glowColors[level]; }
  function popup(text,color){ const d=document.createElement('div'); d.className='popup'; d.style.color=color||'#e6edf7'; d.textContent=text; document.body.appendChild(d); setTimeout(()=>d.remove(),1000); }
  function tierFlash(label){ const t=document.getElementById('tier'); if(!label){t.style.opacity=0;return;} t.textContent=label; t.style.opacity=1; }

  function nextOrder(){
    current=PROJ[Math.floor(Math.random()*PROJ.length)];
    const req=Requisition.generate({region:current.region,view:current.view,seed:seedN++});
    document.getElementById('reqhost').innerHTML=Requisition.card(req);
    // Build multiple-choice: the correct exam + 3 distractors
    const opts=new Set([current.region+' — '+current.view]);
    while(opts.size<4){ const p=PROJ[Math.floor(Math.random()*PROJ.length)]; opts.add(p.region+' — '+p.view); }
    const shuffled=[...opts].sort(()=>Math.random()-0.5);
    const correct=current.region+' — '+current.view;
    document.getElementById('actions').innerHTML=shuffled.map(o=>
      `<button onclick="answer(this,'${o.replace(/'/g,"")}'==='${correct.replace(/'/g,"")}')">${o}</button>`).join('');
    askedAt=performance.now();
  }

  window.answer=function(btn,correct){
    if(!running) return;
    const speedMs=performance.now()-askedAt;
    // accuracy: simulate a placement accuracy for correct answers
    const accuracy=correct? (80+Math.floor(Math.random()*20)) : 0;
    const ev=eng.answer(correct,{accuracy,speedMs});
    document.getElementById('score').textContent=ev.total;
    document.getElementById('combo').textContent='×'+ev.multiplier;
    document.getElementById('streak').textContent=ev.streak+' / '+ev.best;
    setGlow(ev.glow);
    popup(ev.popup, correct?(ev.multiplier>=2?'#fbbf24':'#34d399'):'#fb7185');
    if(ev.tier && correct) tierFlash(ev.milestone?ev.tier+'!':ev.tier); else tierFlash('');
    btn.className=correct?'good':'bad';
    setTimeout(()=>{ if(running) nextOrder(); }, 340);
  };

  window.startShift=function(){
    eng=StreakEngine({storage:window.localStorage});
    timeLeft=60; running=true; seedN=Math.floor(Math.random()*1e6);
    document.getElementById('score').textContent='0';
    nextOrder();
    clearInterval(timer);
    timer=setInterval(()=>{
      timeLeft--; document.getElementById('time').textContent=timeLeft;
      if(timeLeft<=0){ endShift(); }
    },1000);
  };

  function endShift(){
    running=false; clearInterval(timer); setGlow(0); tierFlash('');
    const s=eng.state();
    document.getElementById('reqhost').innerHTML=
      `<div class="end"><h1>Shift complete</h1>
       <p class="sub">Score <b style="color:var(--cy)">${s.total}</b> · Accuracy ${s.accuracy}% · Best streak ${s.best} · Peak combo ×${s.maxCombo}</p></div>`;
    document.getElementById('actions').innerHTML='<button class="start" onclick="startShift()">New shift</button>';
  }

  // show a sample order at rest
  (function(){ const req=Requisition.generate({region:'Wrist',view:'PA',seed:1}); document.getElementById('reqhost').innerHTML=Requisition.card(req);
    const t=StreakComboAPI.selfTest(), r=Requisition.selfTest();
    document.getElementById('foot').textContent='Engines self-test: streak '+(t.pass?'PASS':'FAIL')+' · requisition '+(r.pass?'PASS':'FAIL');
  })();
</script>
</body>
</html>
