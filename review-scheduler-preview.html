<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Review Scheduler — Preview</title>
<style>
  :root{--bg:#0b1120;--panel:#131c2e;--line:#22304a;--ink:#e6edf7;--mut:#8fa3c0;--cy:#38bdf8;
        --new:#64748b;--learn:#fbbf24;--review:#38bdf8;--master:#34d399;--bad:#fb7185;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:20px}
  h1{font-size:18px;margin:0 0 2px} .sub{color:var(--mut);margin:0 0 16px}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:0 0 12px}
  button{background:#0e1626;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;margin:0 6px 6px 0}
  button:hover{border-color:var(--cy)} button.primary{background:var(--cy);color:#04121f;border-color:var(--cy);font-weight:600}
  .clock{font-variant-numeric:tabular-nums;color:var(--cy);font-weight:600}
  .queue{list-style:none;padding:0;margin:0}
  .qitem{display:flex;align-items:center;gap:10px;padding:9px 10px;background:#0e1626;border-radius:8px;margin-bottom:7px}
  .qitem .id{flex:1;font-weight:600}
  .qitem .meta{color:var(--mut);font-size:12px}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .m-new{background:rgba(100,116,139,.2);color:var(--new)} .m-learning{background:rgba(251,191,36,.16);color:var(--learn)}
  .m-reviewing{background:rgba(56,189,248,.16);color:var(--review)} .m-mastered{background:rgba(52,211,153,.16);color:var(--master)}
  .maps{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .card{background:#0e1626;border:1px solid var(--line);border-radius:10px;padding:10px}
  .card h3{margin:0 0 8px;font-size:12px;color:var(--mut)}
  .dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin:2px}
  .bars{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:6px 0}
  .bars i{display:block;height:100%}
  .stat{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line);font-size:13px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--mut);font-size:12px;margin-top:8px}
  .foot{color:var(--mut);font-size:12px}
  code{background:#0e1626;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
  <h1>Spaced-Repetition Review Scheduler <span style="color:var(--mut);font-weight:400">— Roadmap #19</span></h1>
  <p class="sub">Practice projections, then time-travel forward to watch weak ones resurface and mastered ones stretch out.</p>

  <div class="grid">
    <div>
      <div class="panel">
        <h2>Simulate</h2>
        <div>Day: <span class="clock" id="clock"></span></div>
        <div style="margin-top:10px">
          <button class="primary" onclick="practiceDue(true)">Practice due — do well (90)</button>
          <button onclick="practiceDue(false)">Practice due — struggle (50)</button>
        </div>
        <div style="margin-top:6px">
          <button onclick="advance(1)">+1 day</button>
          <button onclick="advance(3)">+3 days</button>
          <button onclick="advance(7)">+1 week</button>
          <button onclick="randomSession()">Random mixed session</button>
        </div>
        <div style="margin-top:6px"><button onclick="reset()">Reset all</button></div>
        <p class="foot" id="selftest" style="margin-top:10px"></p>
      </div>
      <div class="panel">
        <h2>Progress</h2>
        <div id="stats"></div>
        <div class="bars" id="bars"></div>
        <div class="legend">
          <span><span class="dot m-new" style="background:var(--new)"></span>New</span>
          <span><span class="dot" style="background:var(--learn)"></span>Learning</span>
          <span><span class="dot" style="background:var(--review)"></span>Reviewing</span>
          <span><span class="dot" style="background:var(--master)"></span>Mastered</span>
        </div>
      </div>
    </div>

    <div>
      <div class="panel">
        <h2>Due today (<span id="dueCount">0</span>)</h2>
        <ul class="queue" id="queue"></ul>
      </div>
      <div class="panel">
        <h2>Skill map by region</h2>
        <div class="maps" id="maps"></div>
      </div>
    </div>
  </div>

<script src="review-scheduler.js"></script>
<script>
  // The app's real projection set (region|view)
  const PROJECTIONS = [
    'Foot|AP','Foot|Oblique','Foot|Lateral',
    'Hand|PA','Hand|Oblique','Hand|Fan Lateral',
    'Wrist|PA','Wrist|Oblique','Wrist|Lateral','Wrist|PA Ulnar Deviation',
    'Elbow|AP','Elbow|Internal Oblique','Elbow|External Oblique','Elbow|Lateral',
    'Elbow|Partial Flexion','Elbow|Partial Extension','Elbow|Radial Coyle','Elbow|Ulnar Coyle',
    'Forearm|AP','Forearm|Lateral','Forearm|PA','Forearm|Crosstable Lateral',
  ];
  const DAY = 86400000;
  let clock = Date.UTC(2026, 0, 1);
  let rs = ReviewScheduler({ storage: window.__mem || (window.__mem = memStore()), now: () => clock });

  function memStore(){ let m={}; return {getItem:k=>k in m?m[k]:null,setItem:(k,v)=>m[k]=String(v),removeItem:k=>{delete m[k]}}; }
  // expose memoryStorage from module
  const memoryStorage = ReviewSchedulerAPI.memoryStorage;

  function dayNum(){ return Math.round((clock - Date.UTC(2026,0,1))/DAY); }

  function practiceDue(good){
    const due = rs.getDue({ now: clock, projections: PROJECTIONS, limit: 12 });
    due.forEach(item => {
      const base = good ? 88 : 48;
      const score = base + Math.round((Math.random()*16)-8);
      rs.record(item.id, score, clock);
    });
    render();
  }
  function randomSession(){
    const due = rs.getDue({ now: clock, projections: PROJECTIONS, limit: 10 });
    due.forEach(item => rs.record(item.id, 40 + Math.round(Math.random()*55), clock));
    render();
  }
  function advance(d){ clock += d*DAY; render(); }
  function reset(){ rs.reset(); clock = Date.UTC(2026,0,1); render(); }

  const capitalize = s => s;
  function render(){
    document.getElementById('clock').textContent = 'Day ' + dayNum();
    const due = rs.getDue({ now: clock, projections: PROJECTIONS });
    document.getElementById('dueCount').textContent = due.length;
    document.getElementById('queue').innerHTML = due.slice(0,14).map(r=>{
      const m = ReviewSchedulerAPI.masteryOf(r);
      const when = r.attempts===0 ? 'never practiced'
        : (r.lastScore!=null ? ('last '+r.lastScore+'%') : '');
      const over = r.attempts>0 ? Math.max(0,Math.round((clock-r.dueAt)/DAY)) : 0;
      return `<li class="qitem"><span class="pill m-${m}">${m}</span>
        <span class="id">${r.id}</span>
        <span class="meta">${when}${over>0?' · '+over+'d overdue':''}</span></li>`;
    }).join('') || '<li class="foot">Nothing due — all caught up. Advance the clock.</li>';

    const st = rs.stats({ projections: PROJECTIONS });
    document.getElementById('stats').innerHTML =
      `<div class="stat"><span>Projections tracked</span><b>${st.total}</b></div>
       <div class="stat"><span>Mastered</span><b>${st.byMastery.mastered} (${st.masteredPct}%)</b></div>
       <div class="stat"><span>Avg last score</span><b>${st.avgLastScore==null?'—':st.avgLastScore+'%'}</b></div>
       <div class="stat"><span>Total attempts</span><b>${st.attempts}</b></div>
       <div class="stat"><span>Lapses</span><b>${st.lapses}</b></div>`;
    const b = st.byMastery, tot = Math.max(1, st.total);
    const seg = (n,c)=>`<i style="width:${100*n/tot}%;background:${c}"></i>`;
    document.getElementById('bars').innerHTML =
      seg(b.mastered,'var(--master)')+seg(b.reviewing,'var(--review)')+seg(b.learning,'var(--learn)')+seg(b.new,'var(--new)');

    // region skill map
    const cmap={new:'var(--new)',learning:'var(--learn)',reviewing:'var(--review)',mastered:'var(--master)'};
    const byReg = {};
    PROJECTIONS.forEach(id=>{ const reg=id.split('|')[0]; (byReg[reg]=byReg[reg]||[]).push(id); });
    document.getElementById('maps').innerHTML = Object.entries(byReg).map(([reg,ids])=>{
      const dots = ids.map(id=>{
        const m = rs.mastery(id);
        return `<span class="dot" title="${id.split('|')[1]}: ${m}" style="background:${cmap[m]}"></span>`;
      }).join('');
      return `<div class="card"><h3>${reg}</h3>${dots}</div>`;
    }).join('');
  }

  const t = ReviewSchedulerAPI.selfTest();
  document.getElementById('selftest').textContent = 'Self-test: ' + (t.pass ? 'PASS ✓' : 'FAIL — ' + t.failures.join('; '));
  render();
</script>
</body>
</html>
